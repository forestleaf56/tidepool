<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#0E151B">
<meta name="description" content="Twenty classic puzzles, fifty levels each. Every level is the same for everyone.">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tidepool">
<title>Tidepool — twenty puzzles deep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter+Tight:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --abyss:#0E151B; --stone:#1A2731; --stone-2:#22323E; --line:#2E4150;
  --foam:#E8F1EE; --mute:#8AA0AC;
  --kelp:#3FB98A; --urchin:#E0457B; --sand:#C9B899;
  --r:14px; --tap:44px;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overscroll-behavior:none}
body{
  background:
    radial-gradient(120% 60% at 50% -10%, #16222C 0%, transparent 60%),
    var(--abyss);
  color:var(--foam);
  font-family:'Inter Tight',system-ui,sans-serif;
  font-size:16px; line-height:1.45;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,.display{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-.02em;margin:0}
.mono,.num{font-family:'Space Mono',monospace;font-variant-numeric:tabular-nums}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
:focus-visible{outline:2px solid var(--kelp);outline-offset:2px;border-radius:6px}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}

#app{min-height:100%;padding-top:var(--safe-t);padding-bottom:calc(64px + var(--safe-b))}
.screen{max-width:560px;margin:0 auto;padding:18px 16px 28px}
.hidden{display:none!important}

/* ── top bar ─────────────────────────────── */
.topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.topbar .back{width:var(--tap);height:var(--tap);margin-left:-10px;display:grid;place-items:center;font-size:22px;color:var(--mute)}
.eyebrow{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mute)}

/* ── home ────────────────────────────────── */
.masthead{margin-bottom:22px}
.masthead h1{font-size:clamp(38px,12vw,54px);line-height:.92}
.masthead h1 em{font-style:normal;color:var(--kelp)}
.masthead p{color:var(--mute);margin:8px 0 0;font-size:14px;max-width:34ch}
.streak{display:inline-flex;align-items:center;gap:7px;margin-top:14px;padding:6px 11px;
  border:1px solid var(--line);border-radius:999px;font-size:12px}
.streak b{font-family:'Space Mono',monospace;color:var(--sand)}

.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}
.tile{position:relative;background:var(--stone);border:1px solid var(--line);border-radius:var(--r);
  padding:11px;text-align:left;display:flex;flex-direction:column;gap:9px;transition:transform .12s,border-color .12s}
.tile:active{transform:scale(.975);border-color:var(--kelp)}
.tile canvas{width:100%;aspect-ratio:1;display:block;border-radius:8px;background:#131E26}
.tile .tname{font-family:'Bricolage Grotesque',sans-serif;font-weight:600;font-size:15px;line-height:1.15}
.tile .tmeta{display:flex;justify-content:space-between;align-items:baseline;font-family:'Space Mono',monospace;
  font-size:10.5px;color:var(--mute);letter-spacing:.04em}
.tile .tmeta .prog{color:var(--kelp)}
.tile.locked{opacity:.42}
.tile.locked .tname:after{content:' · soon';color:var(--mute);font-weight:400}

/* ── level map (depth chart) ─────────────── */
.depth{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:linear-gradient(#182530,#0E151B)}
.band{display:flex;align-items:center;gap:10px;padding:7px 12px;border-bottom:1px solid rgba(46,65,80,.5);font-size:12px;color:var(--mute)}
.band .bl{font-family:'Space Mono',monospace;letter-spacing:.14em;text-transform:uppercase;font-size:10px}
.levels{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:12px}
.lv{aspect-ratio:1;border:1px solid var(--line);border-radius:10px;background:var(--stone);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-family:'Space Mono',monospace;font-size:15px;transition:transform .1s}
.lv:active{transform:scale(.93)}
.lv .st{font-size:8px;letter-spacing:1px;color:var(--sand);height:9px}
.lv.done{border-color:var(--kelp);color:var(--kelp)}
.lv.next{border-color:var(--foam);box-shadow:0 0 0 1px var(--foam) inset}
.lv.far{opacity:.5}

/* ── game host ───────────────────────────── */
#game-screen{max-width:560px;margin:0 auto;padding:10px 12px}
.hud{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.hud .grow{flex:1}
.hud .clock{font-family:'Space Mono',monospace;font-size:20px;font-weight:700}
.hud .lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mute)}
.hud button{width:var(--tap);height:var(--tap);border-radius:10px;border:1px solid var(--line);display:grid;place-items:center;font-size:17px}
#board{touch-action:manipulation;user-select:none}

/* sudoku */
.sk{display:grid;grid-template-columns:repeat(9,1fr);gap:1px;background:var(--line);
  border:2px solid var(--line);border-radius:10px;overflow:hidden;aspect-ratio:1}
.sk .c{background:var(--stone);display:grid;place-items:center;position:relative;
  font-family:'Space Mono',monospace;font-size:clamp(15px,5vw,22px);color:var(--kelp)}
.sk .c.given{background:var(--stone-2);color:var(--foam);font-weight:700}
.sk .c.br{box-shadow:inset -2px 0 0 var(--line)}
.sk .c.bb{box-shadow:inset 0 -2px 0 var(--line)}
.sk .c.br.bb{box-shadow:inset -2px 0 0 var(--line),inset 0 -2px 0 var(--line)}
.sk .c.peer{background:#20303B}
.sk .c.given.peer{background:#27394650}
.sk .c.sel{outline:2px solid var(--foam);outline-offset:-2px;z-index:2}
.sk .c.same{color:var(--sand)}
.sk .c.bad{color:var(--urchin);animation:shake .28s}
@keyframes shake{25%{transform:translateX(-3px)}75%{transform:translateX(3px)}}
.sk .notes{position:absolute;inset:2px;display:grid;grid-template:repeat(3,1fr)/repeat(3,1fr);
  font-size:8px;color:var(--mute);pointer-events:none}
.pad{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
.pad button{height:52px;border:1px solid var(--line);border-radius:11px;background:var(--stone);
  font-family:'Space Mono',monospace;font-size:20px;position:relative}
.pad button:active{background:var(--stone-2)}
.pad button.off{opacity:.28}
.pad button .left{position:absolute;bottom:3px;right:5px;font-size:9px;color:var(--mute)}
.pad button.on{border-color:var(--kelp);color:var(--kelp)}

/* ── overlays ────────────────────────────── */
.sheet{position:fixed;inset:0;background:rgba(8,13,17,.86);backdrop-filter:blur(6px);
  display:grid;place-items:end center;z-index:60;animation:fade .18s}
@keyframes fade{from{opacity:0}}
.sheet .card{width:100%;max-width:560px;background:var(--stone);border-top:1px solid var(--line);
  border-radius:20px 20px 0 0;padding:24px 20px calc(24px + var(--safe-b));animation:up .24s cubic-bezier(.2,.8,.2,1)}
@keyframes up{from{transform:translateY(30px)}}
.result-time{font-family:'Space Mono',monospace;font-size:46px;font-weight:700;line-height:1;margin:6px 0 2px}
.stars{font-size:26px;letter-spacing:6px;color:var(--sand);margin:10px 0}
.stars .dim{opacity:.2}
.emojibar{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap}
.emojibar button{width:46px;height:46px;border:1px solid var(--line);border-radius:12px;font-size:22px}
.emojibar button.picked{border-color:var(--urchin);background:#2A1B24}
.row{display:flex;gap:10px;margin-top:14px}
.btn{flex:1;height:52px;border-radius:12px;background:var(--kelp);color:#08110D;font-weight:600;
  display:grid;place-items:center}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--foam)}
.btn:disabled{opacity:.5}

/* ── auth ────────────────────────────────── */
.field{margin-bottom:12px}
.field label{display:block;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--mute);margin-bottom:6px}
.field input{width:100%;height:52px;background:var(--stone);border:1px solid var(--line);
  border-radius:12px;padding:0 14px;color:var(--foam);font-size:16px}
.field input:focus{border-color:var(--kelp);outline:none}
.msg{font-size:13px;margin:10px 0;color:var(--urchin);line-height:1.45}
.msg.ok{color:var(--kelp)}
.linkish{color:var(--mute);font-size:14px;text-align:center;margin-top:18px}
.linkish b{color:var(--kelp)}

/* ── lists ───────────────────────────────── */
.item{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);
  border-radius:12px;background:var(--stone);margin-bottom:8px}
.item .av{width:38px;height:38px;border-radius:10px;background:var(--stone-2);display:grid;place-items:center;font-size:19px}
.item .grow{flex:1;min-width:0}
.item .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item .sub{font-family:'Space Mono',monospace;font-size:11px;color:var(--mute)}
.item .rk{font-family:'Space Mono',monospace;font-size:18px;color:var(--mute);width:28px;text-align:right}
.item.me{border-color:var(--kelp)}
.pill{padding:7px 12px;border:1px solid var(--line);border-radius:999px;font-size:12px;white-space:nowrap}
.pill.on{border-color:var(--kelp);color:var(--kelp)}
.scroller{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:14px;scrollbar-width:none}
.scroller::-webkit-scrollbar{display:none}
.empty{text-align:center;color:var(--mute);padding:38px 20px;font-size:14px;
  border:1px dashed var(--line);border-radius:var(--r)}

/* ── tab bar ─────────────────────────────── */
#tabs{position:fixed;left:0;right:0;bottom:0;z-index:50;display:flex;
  background:rgba(14,21,27,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);
  padding-bottom:var(--safe-b)}
#tabs button{flex:1;height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  font-family:'Space Mono',monospace;font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--mute)}
#tabs button .ic{font-size:18px;line-height:1}
#tabs button.on{color:var(--kelp)}
#tabs .dot{position:absolute;top:11px;margin-left:15px;width:7px;height:7px;border-radius:50%;background:var(--urchin)}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(76px + var(--safe-b));z-index:70;
  background:var(--stone-2);border:1px solid var(--line);padding:11px 16px;border-radius:12px;font-size:14px;
  animation:up .2s;max-width:90vw}

/* ── nonogram ── */
.ng{display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto 1fr;gap:3px}
.ng-corner{}
.ng-ctop{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:1px}
.ng-cl{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  font-family:'Space Mono',monospace;font-size:9.5px;color:var(--mute);line-height:1.15;min-height:34px}
.ng-cleft{display:grid;grid-template-rows:repeat(var(--n),1fr);gap:1px}
.ng-rl{display:flex;align-items:center;justify-content:flex-end;gap:4px;padding-right:5px;
  font-family:'Space Mono',monospace;font-size:9.5px;color:var(--mute);min-width:30px}
.ng-grid{display:grid;grid-template-columns:repeat(var(--n),1fr);aspect-ratio:1;
  gap:1px;background:var(--line);border:2px solid var(--line);border-radius:6px;overflow:hidden;
  touch-action:none}
.ngc{background:var(--stone);position:relative}
.ngc.br{box-shadow:inset -2px 0 0 var(--line)}
.ngc.bb{box-shadow:inset 0 -2px 0 var(--line)}
.ngc.br.bb{box-shadow:inset -2px 0 0 var(--line),inset 0 -2px 0 var(--line)}
.ngc.fill{background:var(--kelp)}
.ngc.cross:after{content:'';position:absolute;inset:34%;
  background:linear-gradient(45deg,transparent 44%,var(--mute) 44% 56%,transparent 56%),
             linear-gradient(-45deg,transparent 44%,var(--mute) 44% 56%,transparent 56%)}

/* ── binairo ── */
.bn{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:3px;aspect-ratio:1}
.bnc{background:var(--stone);border-radius:5px;display:grid;place-items:center;position:relative}
.bnc.given{background:var(--stone-2)}
.bnc.one:after,.bnc.zero:after{content:'';width:62%;aspect-ratio:1;border-radius:50%}
.bnc.one:after{background:var(--kelp)}
.bnc.zero:after{background:#3A5060}

/* ── futoshiki ── */
.fs{display:grid;gap:2px;aspect-ratio:1}
.fsc{background:var(--stone);border-radius:6px;display:grid;place-items:center;
  font-family:'Space Mono',monospace;font-size:clamp(15px,4.6vw,21px);color:var(--kelp)}
.fsc.given{background:var(--stone-2);color:var(--foam);font-weight:700}
.fsc.sel{outline:2px solid var(--foam);outline-offset:-2px}
.fsg-gap{display:grid;place-items:center;color:var(--sand);font-size:15px;font-weight:700}
.fsg-dot{}

/* ── kakuro ── */
.kk{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:1px;background:var(--line);
  border:2px solid var(--line);border-radius:8px;overflow:hidden;aspect-ratio:1}
.kkb{background:#16212A;position:relative;
  background-image:linear-gradient(to bottom right,transparent calc(50% - 0.5px),var(--line) 50%,transparent calc(50% + 0.5px))}
.kkb .dn,.kkb .rt{position:absolute;font-family:'Space Mono',monospace;font-size:9.5px;color:var(--sand)}
.kkb .dn{left:2px;bottom:1px}
.kkb .rt{right:2px;top:1px}
.kkc{background:var(--stone-2);display:grid;place-items:center;
  font-family:'Space Mono',monospace;font-size:clamp(13px,4vw,19px);color:var(--kelp)}
.kkc.given{color:var(--foam);font-weight:700;background:#263946}
.kkc.sel{outline:2px solid var(--foam);outline-offset:-2px}

/* ── bridges ── */
.hs{display:block;margin:0 auto;border:1px solid var(--line);border-radius:10px;background:#131E26}

/* ── minefield ── */
.ms{display:grid;grid-template-columns:repeat(var(--w),1fr);gap:2px;touch-action:manipulation}
.msc{aspect-ratio:1;background:var(--stone-2);border-radius:4px;display:grid;place-items:center;
  font-family:'Space Mono',monospace;font-size:clamp(11px,3.4vw,16px);font-weight:700}
.msc.open{background:var(--stone)}
.msc.flag{color:var(--urchin)}
.msc.mine{background:#3A1B28;color:var(--urchin)}

.hint{color:var(--mute);font-size:12.5px;line-height:1.5;margin:14px 2px 0;text-align:center}

/* ── flow ── */
.fl{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:2px;aspect-ratio:1;touch-action:none}
.flc{background:var(--stone);border-radius:4px;position:relative}
.flc.on{background:var(--fill);border-radius:2px}
.flc.end:after{content:'';position:absolute;inset:16%;border-radius:50%;
  background:var(--hue);border:2px solid var(--abyss)}

/* ── maze ── */
.mz{display:block;margin:0 auto;border:1px solid var(--line);border-radius:10px;
  background:#131E26;touch-action:none}

/* ── slitherlink ── */
.sl{position:relative;margin:0 auto}
.sldot{position:absolute;width:5px;height:5px;border-radius:50%;background:#3A5060;
  transform:translate(-50%,-50%);pointer-events:none}
.slnum{position:absolute;transform:translate(-50%,-50%);color:var(--mute);
  font-family:'Space Mono',monospace;pointer-events:none}
.sledge{position:absolute;z-index:2}
.sledge:after{content:'';position:absolute;border-radius:2px;background:transparent}
.sledge.h:after{left:6%;right:6%;top:50%;height:3px;transform:translateY(-50%)}
.sledge.v:after{top:6%;bottom:6%;left:50%;width:3px;transform:translateX(-50%)}
.sledge.on:after{background:var(--kelp)}
.sledge.no:before{content:'\2715';position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);color:#54697A;font-size:9px}

/* ── shared move counters ── */
.movebar{display:flex;align-items:center;gap:9px;margin-top:13px;justify-content:center}
.movebar .lbl{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.14em;
  text-transform:uppercase;color:var(--mute)}
.movebar b{font-family:'Space Mono',monospace;color:var(--sand);font-size:15px}
.mini{border:1px solid var(--line);border-radius:8px;padding:7px 11px;font-size:12px;color:var(--mute)}

/* ── fifteen ── */
.fif{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:5px;aspect-ratio:1}
.fift{background:var(--stone-2);border-radius:8px;font-family:'Space Mono',monospace;
  font-weight:700;font-size:clamp(15px,5vw,24px);color:var(--foam)}
.fift.blank{background:transparent}
.fift.home{color:var(--kelp)}

/* ── lights out ── */
.lo{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:6px;aspect-ratio:1}
.loc{background:#18242E;border:1px solid var(--line);border-radius:9px}
.loc.on{background:var(--sand);border-color:var(--sand);box-shadow:0 0 14px rgba(201,184,153,.32)}

/* ── peg solitaire ── */
.pg{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;aspect-ratio:1;max-width:330px;margin:0 auto}
.pgh{background:#16212A;border-radius:50%;position:relative}
.pgh.peg:after{content:'';position:absolute;inset:14%;border-radius:50%;background:var(--kelp)}
.pgh.sel:after{background:var(--foam)}

/* ── sokoban ── */
.sk2{display:grid;grid-template-columns:repeat(var(--n),1fr);gap:2px;aspect-ratio:1}
.sk2c{background:#16212A;border-radius:3px;position:relative}
.sk2c.wall{background:var(--stone-2)}
.sk2c.goal{box-shadow:inset 0 0 0 2px rgba(201,184,153,.5)}
.sk2c.box:after{content:'';position:absolute;inset:12%;border-radius:4px;background:#B4794C}
.sk2c.box.home:after{background:var(--sand)}
.sk2c.you:before{content:'';position:absolute;inset:22%;border-radius:50%;background:var(--kelp);z-index:2}
.dpad{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:14px}
.dpad button{height:50px;border:1px solid var(--line);border-radius:11px;background:var(--stone);font-size:18px}

/* ── gridlock ── */
.rh{position:relative;margin:14px auto 0;background:#131E26;border:1px solid var(--line);
  border-radius:10px;touch-action:none}
.rh-exit{position:absolute;right:-2px;top:33.33%;height:16.66%;width:4px;
  background:var(--kelp);border-radius:2px}
.rhcar{position:absolute;margin:2px;border-radius:7px;background:#33485A;touch-action:none}
.rhcar.hero{background:var(--urchin)}

/* ── 2048 ── */
.t48{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;aspect-ratio:1;touch-action:none;margin-top:12px}
.t48c{background:#18242E;border-radius:8px;display:grid;place-items:center;
  font-family:'Space Mono',monospace;font-weight:700;font-size:clamp(16px,6vw,28px);color:#E8F1EE}
.t48c[data-v="2"],.t48c[data-v="4"]{background:#2A3B48}
.t48c[data-v="8"],.t48c[data-v="16"]{background:#33586A;color:#E8F1EE}
.t48c[data-v="32"],.t48c[data-v="64"]{background:#3FB98A;color:#08110D}
.t48c[data-v="128"],.t48c[data-v="256"]{background:#C9B899;color:#1A1408;font-size:clamp(14px,5vw,24px)}
.t48c[data-v="512"],.t48c[data-v="1024"],.t48c[data-v="2048"]{background:#E0457B;color:#fff;font-size:clamp(13px,4.4vw,22px)}

/* ── blockdrop ── */
.bd{display:grid;grid-template-columns:repeat(9,1fr);gap:2px;aspect-ratio:1;margin-top:12px}
.bdc{background:#16212A;border-radius:3px}
.bdc.alt{background:#1B2833}
.bdc.on{background:var(--kelp)}
.tray{display:flex;gap:12px;justify-content:center;align-items:center;margin-top:16px;min-height:74px}
.trayp{display:grid;grid-template-columns:repeat(var(--pc),12px);grid-template-rows:repeat(var(--pr),12px);
  gap:2px;padding:9px;border:1px solid var(--line);border-radius:10px;background:var(--stone)}
.trayp.sel{border-color:var(--kelp);background:var(--stone-2)}
.trayp.spent{opacity:.18}

  0%{transform:scale(1)} 35%{transform:scale(1.022);filter:brightness(1.16)} 100%{transform:scale(1)}
}

}

  font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.1em;color:var(--mute)}

  border-top-color:var(--kelp);animation:spin .7s linear infinite}

<body>

<div id="app"></div>
<nav id="tabs" class="hidden" role="tablist" aria-label="Sections"></nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════
   TIDEPOOL — Phase 1 + 2
   Everything client-side. Score writes go through /api/puzzle.
   ═══════════════════════════════════════════════════════════════ */

/* ---------- config -------------------------------------------- */
const CFG = {
  SUPABASE_URL: window.TIDEPOOL_URL  || localStorage.getItem('tp.url')  || '',
  SUPABASE_KEY: window.TIDEPOOL_KEY  || localStorage.getItem('tp.key')  || ''
};
const sb = (CFG.SUPABASE_URL && CFG.SUPABASE_KEY && window.supabase)
  ? window.supabase.createClient(CFG.SUPABASE_URL, CFG.SUPABASE_KEY)
  : null;
const OFFLINE = !sb;   // guest mode: play everything, nothing syncs

/* ---------- seeded rng ---------------------------------------- */
function xmur3(str){
  let h = 1779033703 ^ str.length;
  for (let i=0;i<str.length;i++){
    h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
    h = (h << 13) | (h >>> 19);
  }
  return () => {
    h = Math.imul(h ^ (h>>>16), 2246822507);
    h = Math.imul(h ^ (h>>>13), 3266489909);
    return (h ^= h>>>16) >>> 0;
  };
}
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a>>>15, 1 | a);
    t = t + Math.imul(t ^ t>>>7, 61 | t) ^ t;
    return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
/** Deterministic seed string — the whole fairness model rests on this. */
const seedFor = (gameId, level) => `tidepool:v1:${gameId}:${level}`;
function rngFor(gameId, level){ return mulberry32(xmur3(seedFor(gameId, level))()); }
function shuffle(arr, rnd){
  for (let i=arr.length-1;i>0;i--){ const j = (rnd()*(i+1))|0; [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

/* ---------- audio (synthesized, no assets) -------------------- */
const Audio2 = (()=>{
  let ctx = null, on = localStorage.getItem('tp.sound') !== '0';
  const ac = () => ctx || (ctx = new (window.AudioContext||window.webkitAudioContext)());
  function blip(freq, dur=.07, type='sine', vol=.16){
    if (!on) return;
    try{
      const c = ac(), o = c.createOscillator(), g = c.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(.0001, c.currentTime + dur);
      o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime + dur);
    }catch(e){}
  }
  return {
    tap:   ()=>blip(520,.05,'sine',.1),
    place: ()=>blip(740,.07),
    wrong: ()=>{ blip(150,.14,'sawtooth',.1); },
    win:   ()=>[0,110,220,380].forEach((d,i)=>setTimeout(()=>blip([523,659,784,1047][i],.28,'triangle',.14),d)),
    toggle(){ on = !on; localStorage.setItem('tp.sound', on?'1':'0'); return on; },
    get on(){ return on; }
  };
})();
const haptic = ms => navigator.vibrate && navigator.vibrate(ms);

/* ---------- local progress mirror ----------------------------- */
const Progress = {
  key(){ return 'tp.prog.' + (State.user?.id || 'guest'); },
  load(){ try{ return JSON.parse(localStorage.getItem(this.key())) || {}; }catch(e){ return {}; } },
  save(p){ try{ localStorage.setItem(this.key(), JSON.stringify(p)); }catch(e){} },
  best(gameId, level){ return this.load()[gameId + ':' + level] || null; },
  record(gameId, level, entry){
    const p = this.load(), k = gameId + ':' + level, prev = p[k];
    const better = !prev || (entry.resultType === 'time'
      ? entry.value < prev.value : entry.value > prev.value);
    if (better) { p[k] = entry; this.save(p); }
    return better;
  },
  cleared(gameId){
    const p = this.load(); let n = 0;
    for (let l=1; l<=50; l++) if (p[gameId+':'+l]) n++;
    return n;
  },
  nextLevel(gameId){
    const p = this.load();
    for (let l=1; l<=50; l++) if (!p[gameId+':'+l]) return l;
    return 50;
  }
};

/* ---------- api ------------------------------------------------ */
async function api(action, body = {}){
  if (OFFLINE) return { offline:true };
  const { data:{ session } } = await sb.auth.getSession();
  const res = await fetch('/api/puzzle?action=' + action, {
    method:'POST',
    headers:{ 'Content-Type':'application/json',
              ...(session ? { Authorization:'Bearer ' + session.access_token } : {}) },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || 'Request failed');
  return res.json();
}

/* ═══════════════════════════════════════════════════════════════
   GAME REGISTRY — 20 titles. Modules land in phases 3–5.
   ═══════════════════════════════════════════════════════════════ */
const GAMES = [
  { id:'sudoku',     name:'Sudoku',        family:'logic', result:'time',  hue:'#3FB98A' },
  { id:'nonogram',   name:'Nonogram',      family:'logic', result:'time',  hue:'#3FB98A' },
  { id:'kakuro',     name:'Kakuro',        family:'logic', result:'time',  hue:'#3FB98A' },
  { id:'binairo',    name:'Binairo',       family:'logic', result:'time',  hue:'#3FB98A' },
  { id:'futoshiki',  name:'Futoshiki',     family:'logic', result:'time',  hue:'#3FB98A' },
  { id:'hashi',      name:'Bridges',       family:'logic', result:'time',  hue:'#3FB98A' },
  { id:'minesweeper',name:'Minefield',     family:'logic', result:'time',  hue:'#3FB98A' },
  { id:'flow',       name:'Flow',          family:'path',  result:'time',  hue:'#58B8D8' },
  { id:'maze',       name:'Maze',          family:'path',  result:'time',  hue:'#58B8D8' },
  { id:'slitherlink',name:'Slitherlink',   family:'path',  result:'time',  hue:'#58B8D8' },
  { id:'fifteen',    name:'Fifteen',       family:'moves', result:'score', hue:'#C9B899' },
  { id:'lightsout',  name:'Lights Out',    family:'moves', result:'score', hue:'#C9B899' },
  { id:'sokoban',    name:'Sokoban',       family:'moves', result:'score', hue:'#C9B899' },
  { id:'rushhour',   name:'Gridlock',      family:'moves', result:'score', hue:'#C9B899' },
  { id:'peg',        name:'Peg Solitaire', family:'moves', result:'score', hue:'#C9B899' },
  { id:'twenty48',   name:'2048',          family:'score', result:'score', hue:'#E0457B' },
  { id:'blockudoku', name:'Blockdrop',     family:'score', result:'score', hue:'#E0457B' },
  { id:'simon',      name:'Echo',          family:'score', result:'score', hue:'#E0457B' },
  { id:'mastermind', name:'Mastermind',    family:'score', result:'score', hue:'#E0457B' },
  { id:'wordscram',  name:'Scramble',      family:'score', result:'score', hue:'#E0457B' }
];
const byId = id => GAMES.find(g => g.id === id);
const MODULES = {};   // id -> module

/* ═══════════════════════════════════════════════════════════════
   SUDOKU — first full module (generator + solver + verifier)
   ═══════════════════════════════════════════════════════════════ */
(function(){
  const N = 9;
  const rowOf = i => (i/9)|0, colOf = i => i%9, boxOf = i => (((i/27)|0)*3) + (((i%9)/3)|0);

  function solveCount(grid, limit=2){
    const g = grid.slice();
    let count = 0;
    (function rec(){
      if (count >= limit) return;
      let best = -1, bestCand = null;
      for (let i=0;i<81;i++){
        if (g[i]) continue;
        const cand = [];
        for (let v=1;v<=9;v++) if (ok(g,i,v)) cand.push(v);
        if (cand.length === 0) return;
        if (!bestCand || cand.length < bestCand.length){ best = i; bestCand = cand; }
        if (cand.length === 1) break;
      }
      if (best === -1){ count++; return; }
      for (const v of bestCand){
        g[best] = v; rec(); g[best] = 0;
        if (count >= limit) return;
      }
    })();
    return count;
  }
  function ok(g, i, v){
    const r = rowOf(i), c = colOf(i), b = boxOf(i);
    for (let j=0;j<81;j++){
      if (j === i || !g[j]) continue;
      if (g[j] !== v) continue;
      if (rowOf(j) === r || colOf(j) === c || boxOf(j) === b) return false;
    }
    return true;
  }
  function fullGrid(rnd){
    const g = new Array(81).fill(0);
    (function fill(i){
      if (i === 81) return true;
      for (const v of shuffle([1,2,3,4,5,6,7,8,9], rnd))
        if (ok(g,i,v)){ g[i] = v; if (fill(i+1)) return true; g[i] = 0; }
      return false;
    })(0);
    return g;
  }
  /** 50-level curve: 42 clues down to 24, symmetric removal, uniqueness enforced. */
  function targetClues(level){
    const t = (level - 1) / 49;
    return Math.round(42 - 18 * Math.pow(t, 0.85));
  }

  MODULES.sudoku = {
    id:'sudoku', result:'time',

    generate(level){
      const rnd = rngFor('sudoku', level);
      const solution = fullGrid(rnd);
      const puzzle = solution.slice();
      const want = targetClues(level);
      const order = shuffle([...Array(81).keys()], rnd);
      let clues = 81;
      for (const i of order){
        if (clues <= want) break;
        const j = 80 - i;                      // 180° symmetric partner
        const a = puzzle[i], b = puzzle[j];
        if (!a) continue;
        puzzle[i] = 0; puzzle[j] = 0;
        if (solveCount(puzzle) !== 1){ puzzle[i] = a; puzzle[j] = b; }
        else clues -= (i === j ? 1 : 2);
      }
      return {
        puzzle, solution,
        given: puzzle.map(v => v !== 0),
        board: puzzle.slice(),
        notes: Array.from({length:81}, ()=> new Set()),
        sel: -1, noteMode:false, mistakes:0,
        targetTime: 180 + level * 9                // 3★ threshold in seconds
      };
    },

    /* miniature drawn on the home tile */
    preview(ctx, s, w){
      const st = this.generate(s.level);
      const cell = w/9;
      ctx.fillStyle = '#131E26'; ctx.fillRect(0,0,w,w);
      ctx.strokeStyle = '#243542'; ctx.lineWidth = 1;
      for (let i=1;i<9;i++){
        ctx.globalAlpha = i%3 ? .5 : 1;
        ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,w);
        ctx.moveTo(0,i*cell); ctx.lineTo(w,i*cell); ctx.stroke();
      }
      ctx.globalAlpha = 1; ctx.fillStyle = '#3FB98A';
      for (let i=0;i<81;i++) if (st.puzzle[i])
        ctx.fillRect(colOf(i)*cell + cell*.34, rowOf(i)*cell + cell*.34, cell*.32, cell*.32);
    },

    render(root, st){
      root.innerHTML =
        '<div class="sk" id="sk"></div>' +
        '<div class="pad" id="pad"></div>';
      const sk = root.querySelector('#sk');
      for (let i=0;i<81;i++){
        const d = document.createElement('div');
        d.className = 'c' + (st.given[i] ? ' given' : '')
          + (colOf(i)%3===2 && colOf(i)!==8 ? ' br' : '')
          + (rowOf(i)%3===2 && rowOf(i)!==8 ? ' bb' : '');
        d.dataset.i = i;
        d.onclick = () => { st.sel = i; Audio2.tap(); this.paint(st); };
        sk.appendChild(d);
      }
      const pad = root.querySelector('#pad');
      for (let v=1;v<=9;v++){
        const b = document.createElement('button');
        b.innerHTML = v + '<span class="left"></span>';
        b.dataset.v = v;
        b.setAttribute('aria-label', 'Enter ' + v);
        b.onclick = () => this.enter(st, v);
        pad.appendChild(b);
      }
      const nb = document.createElement('button');
      nb.textContent = '✎'; nb.id = 'notebtn';
      nb.setAttribute('aria-label', 'Pencil marks');
      nb.onclick = () => { st.noteMode = !st.noteMode; Audio2.tap(); this.paint(st); };
      pad.appendChild(nb);
      this.paint(st);
    },

    enter(st, v){
      const i = st.sel;
      if (i < 0 || st.given[i]) return;
      if (st.noteMode){
        st.notes[i].has(v) ? st.notes[i].delete(v) : st.notes[i].add(v);
        Audio2.tap(); return this.paint(st);
      }
      if (st.board[i] === v){ st.board[i] = 0; return this.paint(st); }
      st.board[i] = v; st.notes[i].clear();
      if (v !== st.solution[i]){
        st.mistakes++; Audio2.wrong(); haptic(35);
        const el = document.querySelector(`.sk .c[data-i="${i}"]`);
        el.classList.add('bad'); setTimeout(()=>el.classList.remove('bad'), 300);
      } else { Audio2.place(); }
      this.paint(st);
      if (this.solved(st)) Host.finish();
    },

    paint(st){
      const sel = st.sel, selV = sel >= 0 ? st.board[sel] : 0;
      document.querySelectorAll('.sk .c').forEach(el => {
        const i = +el.dataset.i, v = st.board[i];
        el.classList.toggle('sel', i === sel);
        el.classList.toggle('peer', sel >= 0 && i !== sel &&
          (rowOf(i)===rowOf(sel) || colOf(i)===colOf(sel) || boxOf(i)===boxOf(sel)));
        el.classList.toggle('same', !!v && v === selV && i !== sel);
        if (v) el.textContent = v;
        else if (st.notes[i].size){
          el.innerHTML = '<div class="notes">' +
            [1,2,3,4,5,6,7,8,9].map(n => `<span>${st.notes[i].has(n)?n:''}</span>`).join('') + '</div>';
        } else el.textContent = '';
      });
      const counts = {};
      st.board.forEach(v => v && (counts[v] = (counts[v]||0)+1));
      document.querySelectorAll('.pad button[data-v]').forEach(b => {
        const v = +b.dataset.v, left = 9 - (counts[v]||0);
        b.classList.toggle('off', left <= 0);
        b.querySelector('.left').textContent = left > 0 ? left : '';
      });
      const nb = document.getElementById('notebtn');
      if (nb) nb.classList.toggle('on', st.noteMode);
    },

    solved(st){ return st.board.every((v,i) => v === st.solution[i]); },
    serialize(st){ return { board: st.board, mistakes: st.mistakes }; },
    stars(st, seconds){
      const t = st.targetTime;
      return seconds <= t ? 3 : seconds <= t*1.6 ? 2 : 1;
    }
  };
})();

/* ═══════════════════════════════════════════════════════════════
   PHASE 3 — logic grids
   Nonogram · Kakuro · Binairo · Futoshiki · Bridges · Minefield

   Every generator here guarantees a puzzle that is solvable by pure
   deduction. Nonogram, Bridges and Minefield are validated with a
   logic solver (no guessing needed); Binairo, Futoshiki and Kakuro
   are validated by counting solutions and requiring exactly one.
   ═══════════════════════════════════════════════════════════════ */

/* ───────────────────────── NONOGRAM ───────────────────────── */
(function(){
  const sizeFor = l => l<=10?5 : l<=20?8 : l<=30?10 : l<=40?12 : 15;

  const clueOf = line => {
    const out = []; let n = 0;
    for (const v of line){ if (v) n++; else if (n){ out.push(n); n = 0; } }
    if (n) out.push(n);
    return out.length ? out : [0];
  };

  /* Enumerate every arrangement of one line consistent with what is known.
     Cells all arrangements agree on become fixed. Returns null if the line
     has become contradictory. */
  function solveLine(cl, line){
    const n = line.length;
    if (cl.length === 1 && cl[0] === 0){
      if (line.some(v => v === 1)) return null;
      return line.map(()=>2);
    }
    let res = null, hits = 0;
    (function place(idx, pos, acc){
      if (hits > 30000) return;
      if (idx === cl.length){
        for (let i=pos;i<n;i++){ if (line[i] === 1) return; acc[i] = 2; }
        hits++;
        if (!res) res = acc.slice();
        else for (let i=0;i<n;i++) if (res[i] !== acc[i]) res[i] = 0;
        return;
      }
      const len = cl[idx];
      for (let s=pos; s+len<=n; s++){
        if (s > pos && line[s-1] === 1) break;      // cannot step over a filled cell
        let ok = true;
        for (let i=s;i<s+len;i++) if (line[i] === 2){ ok = false; break; }
        if (!ok) continue;
        if (s+len < n && line[s+len] === 1) continue;
        const a = acc.slice();
        for (let i=pos;i<s;i++) a[i] = 2;
        for (let i=s;i<s+len;i++) a[i] = 1;
        if (s+len < n) a[s+len] = 2;
        place(idx+1, s+len+1, a);
      }
    })(0, 0, new Array(n).fill(0));
    return res;
  }

  /** Solve by line deduction alone. True only if no guessing was ever needed. */
  function logicSolvable(rows, cols, n){
    const g = new Array(n*n).fill(0);
    for (let pass=0; pass<n*4; pass++){
      let changed = false;
      for (let r=0;r<n;r++){
        const line = g.slice(r*n, r*n+n);
        const out = solveLine(rows[r], line);
        if (!out) return false;
        for (let c=0;c<n;c++) if (out[c] && out[c] !== g[r*n+c]){ g[r*n+c] = out[c]; changed = true; }
      }
      for (let c=0;c<n;c++){
        const line = []; for (let r=0;r<n;r++) line.push(g[r*n+c]);
        const out = solveLine(cols[c], line);
        if (!out) return false;
        for (let r=0;r<n;r++) if (out[r] && out[r] !== g[r*n+c]){ g[r*n+c] = out[r]; changed = true; }
      }
      if (!changed) break;
    }
    return g.every(v => v !== 0);
  }

  MODULES.nonogram = {
    id:'nonogram', result:'time',

    generate(level){
      const rnd = rngFor('nonogram', level);
      const n = sizeFor(level);
      let pattern = null, rows, cols;

      for (let attempt=0; attempt<60 && !pattern; attempt++){
        /* Blobby patterns read as pictures and solve more cleanly than noise. */
        const p = new Array(n*n).fill(0);
        const seeds = 2 + Math.floor(rnd()*3);
        for (let s=0;s<seeds;s++){
          let r = (rnd()*n)|0, c = (rnd()*n)|0;
          const steps = Math.floor(n*n*(0.16 + rnd()*0.14));
          for (let i=0;i<steps;i++){
            p[r*n+c] = 1;
            const d = (rnd()*4)|0;
            r = Math.max(0, Math.min(n-1, r + (d===0?1:d===1?-1:0)));
            c = Math.max(0, Math.min(n-1, c + (d===2?1:d===3?-1:0)));
          }
        }
        const filled = p.filter(Boolean).length;
        if (filled < n*n*0.25 || filled > n*n*0.72) continue;
        const R = [], C = [];
        for (let r=0;r<n;r++) R.push(clueOf(p.slice(r*n, r*n+n)));
        for (let c=0;c<n;c++){ const l=[]; for (let r=0;r<n;r++) l.push(p[r*n+c]); C.push(clueOf(l)); }
        if (logicSolvable(R, C, n)){ pattern = p; rows = R; cols = C; }
      }
      if (!pattern){ // deterministic fallback: a plain checker still solves cleanly
        pattern = new Array(n*n).fill(0).map((_,i)=> ((i%n)+((i/n)|0))%2);
        rows = []; cols = [];
        for (let r=0;r<n;r++) rows.push(clueOf(pattern.slice(r*n, r*n+n)));
        for (let c=0;c<n;c++){ const l=[]; for (let r=0;r<n;r++) l.push(pattern[r*n+c]); cols.push(clueOf(l)); }
      }

      return { n, rows, cols, solution:pattern,
               grid:new Array(n*n).fill(0), mode:1, painting:null,
               targetTime: 40 + n*n*1.6 };
    },

    preview(ctx, s, w){
      const st = this.generate(s.level), n = st.n, cell = w/n;
      ctx.fillStyle = '#131E26'; ctx.fillRect(0,0,w,w);
      ctx.fillStyle = '#3FB98A';
      for (let i=0;i<n*n;i++) if (st.solution[i])
        ctx.fillRect((i%n)*cell+1, ((i/n)|0)*cell+1, cell-2, cell-2);
      ctx.strokeStyle = '#243542'; ctx.lineWidth = 1;
      for (let i=1;i<n;i++){
        ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,w);
        ctx.moveTo(0,i*cell); ctx.lineTo(w,i*cell); ctx.stroke();
      }
    },

    render(root, st){
      const n = st.n;
      const rowMax = Math.max(...st.rows.map(r=>r.length));
      const colMax = Math.max(...st.cols.map(c=>c.length));
      root.innerHTML =
        `<div class="ng" style="--n:${n};--rm:${rowMax};--cm:${colMax}">
           <div class="ng-corner"></div>
           <div class="ng-ctop">${st.cols.map(c=>
             `<div class="ng-cl">${c.map(v=>`<span>${v||''}</span>`).join('')}</div>`).join('')}</div>
           <div class="ng-cleft">${st.rows.map(r=>
             `<div class="ng-rl">${r.map(v=>`<span>${v||''}</span>`).join('')}</div>`).join('')}</div>
           <div class="ng-grid" id="ngg"></div>
         </div>
         <div class="pad" style="grid-template-columns:1fr 1fr">
           <button id="ng-fill" class="on">■ Fill</button>
           <button id="ng-cross">✕ Mark</button>
         </div>`;
      const gg = root.querySelector('#ngg');
      for (let i=0;i<n*n;i++){
        const d = document.createElement('div');
        d.className = 'ngc';
        d.dataset.i = i;
        if ((i%n)%5===4 && i%n!==n-1) d.classList.add('br');
        if ((((i/n)|0)%5)===4 && ((i/n)|0)!==n-1) d.classList.add('bb');
        gg.appendChild(d);
      }
      const setMode = m => {
        st.mode = m;
        root.querySelector('#ng-fill').classList.toggle('on', m===1);
        root.querySelector('#ng-cross').classList.toggle('on', m===2);
      };
      root.querySelector('#ng-fill').onclick  = ()=>{ setMode(1); Audio2.tap(); };
      root.querySelector('#ng-cross').onclick = ()=>{ setMode(2); Audio2.tap(); };

      const cellAt = e => {
        const t = document.elementFromPoint(e.clientX, e.clientY);
        return t && t.classList.contains('ngc') ? +t.dataset.i : -1;
      };
      const apply = i => {
        if (i < 0 || st.painting === null) return;
        if (st.grid[i] === st.painting) return;
        st.grid[i] = st.painting;
        this.paintCell(st, i);
        Audio2.tap();
        if (this.solved(st)) Host.finish();
      };
      gg.addEventListener('pointerdown', e => {
        const i = cellAt(e); if (i < 0) return;
        gg.setPointerCapture(e.pointerId);
        st.painting = st.grid[i] === st.mode ? 0 : st.mode;   // drag erases if you start on a set cell
        apply(i);
      });
      gg.addEventListener('pointermove', e => { if (st.painting !== null) apply(cellAt(e)); });
      const end = () => { st.painting = null; };
      gg.addEventListener('pointerup', end);
      gg.addEventListener('pointercancel', end);
    },

    paintCell(st, i){
      const el = document.querySelector(`.ngc[data-i="${i}"]`);
      if (!el) return;
      el.classList.toggle('fill', st.grid[i] === 1);
      el.classList.toggle('cross', st.grid[i] === 2);
    },

    solved(st){ return st.solution.every((v,i)=> v === 1 ? st.grid[i] === 1 : st.grid[i] !== 1); },
    serialize(st){ return { grid: st.grid.map(v => v===1?1:0) }; },
    stars(st, s){ return s <= st.targetTime ? 3 : s <= st.targetTime*1.7 ? 2 : 1; }
  };
})();

/* ───────────────────────── BINAIRO ───────────────────────── */
(function(){
  const sizeFor = l => l<=10?6 : l<=22?8 : l<=34?10 : l<=44?12 : 14;

  /* every balanced, triple-free line of length n */
  function validLines(n){
    const out = [];
    (function rec(arr, ones, zeros){
      if (arr.length === n){ out.push(arr.slice()); return; }
      for (const v of [0,1]){
        if (v ? ones+1 > n/2 : zeros+1 > n/2) continue;
        const L = arr.length;
        if (L >= 2 && arr[L-1] === v && arr[L-2] === v) continue;
        arr.push(v); rec(arr, ones + (v?1:0), zeros + (v?0:1)); arr.pop();
      }
    })([], 0, 0);
    return out;
  }

  function fullBoard(n, rnd){
    const lines = shuffle(validLines(n), rnd);
    const grid = [], used = new Set(), colOnes = new Array(n).fill(0);
    let guard = 0;
    const okCol = line => {
      const R = grid.length;
      for (let c=0;c<n;c++){
        const v = line[c];
        const ones = colOnes[c] + (v?1:0), zeros = (R+1) - ones;
        if (ones > n/2 || zeros > n/2) return false;
        if (R >= 2 && grid[R-1][c] === v && grid[R-2][c] === v) return false;
      }
      return true;
    };
    const rec = () => {
      if (++guard > 60000) return false;
      if (grid.length === n){
        const cols = new Set();
        for (let c=0;c<n;c++){
          const k = grid.map(r=>r[c]).join('');
          if (cols.has(k)) return false;
          cols.add(k);
        }
        return true;
      }
      let tried = 0;
      for (const line of lines){
        if (tried > 220) break;
        const k = line.join('');
        if (used.has(k) || !okCol(line)) continue;
        tried++;
        used.add(k); grid.push(line);
        for (let c=0;c<n;c++) if (line[c]) colOnes[c]++;
        if (rec()) return true;
        for (let c=0;c<n;c++) if (line[c]) colOnes[c]--;
        grid.pop(); used.delete(k);
      }
      return false;
    };
    if (!rec()) return null;
    return [].concat(...grid);
  }

  const triple = (g, n, r, c, v) => {
    const at = (rr,cc) => (rr<0||cc<0||rr>=n||cc>=n) ? -1 : g[rr*n+cc];
    return (at(r,c-1)===v && at(r,c-2)===v) || (at(r,c+1)===v && at(r,c+2)===v)
        || (at(r,c-1)===v && at(r,c+1)===v)
        || (at(r-1,c)===v && at(r-2,c)===v) || (at(r+1,c)===v && at(r+2,c)===v)
        || (at(r-1,c)===v && at(r+1,c)===v);
  };

  /** Deduction only. Returns the completed grid, or null if guessing would be needed. */
  function logicSolve(puz, n){
    const g = puz.slice();
    for (let pass=0; pass<n*n; pass++){
      let changed = false;
      for (let i=0;i<n*n;i++){
        if (g[i] !== -1) continue;
        const r = (i/n)|0, c = i%n;
        if (triple(g, n, r, c, 0)){ g[i] = 1; changed = true; continue; }
        if (triple(g, n, r, c, 1)){ g[i] = 0; changed = true; continue; }
      }
      for (let r=0;r<n;r++){
        let ones = 0, zeros = 0;
        for (let c=0;c<n;c++){ if (g[r*n+c] === 1) ones++; else if (g[r*n+c] === 0) zeros++; }
        if (ones === n/2 && zeros < n/2)
          for (let c=0;c<n;c++) if (g[r*n+c] === -1){ g[r*n+c] = 0; changed = true; }
        if (zeros === n/2 && ones < n/2)
          for (let c=0;c<n;c++) if (g[r*n+c] === -1){ g[r*n+c] = 1; changed = true; }
      }
      for (let c=0;c<n;c++){
        let ones = 0, zeros = 0;
        for (let r=0;r<n;r++){ if (g[r*n+c] === 1) ones++; else if (g[r*n+c] === 0) zeros++; }
        if (ones === n/2 && zeros < n/2)
          for (let r=0;r<n;r++) if (g[r*n+c] === -1){ g[r*n+c] = 0; changed = true; }
        if (zeros === n/2 && ones < n/2)
          for (let r=0;r<n;r++) if (g[r*n+c] === -1){ g[r*n+c] = 1; changed = true; }
      }
      if (!changed) break;
    }
    return g.every(v => v !== -1) ? g : null;
  }

  MODULES.binairo = {
    id:'binairo', result:'time',

    generate(level){
      const rnd = rngFor('binairo', level);
      const n = sizeFor(level);
      let sol = null;
      for (let a=0; a<8 && !sol; a++) sol = fullBoard(n, rnd);
      if (!sol){
        sol = new Array(n*n);
        for (let r=0;r<n;r++) for (let c=0;c<n;c++)
          sol[r*n+c] = ((c + (r%2)*2 + ((r/2)|0)) % 4) < 2 ? 0 : 1;
      }
      const puzzle = sol.slice();
      const order = shuffle([...Array(n*n).keys()], rnd);
      /* strip as far as pure deduction still carries the solve */
      for (const i of order){
        const save = puzzle[i];
        puzzle[i] = -1;
        if (!logicSolve(puzzle, n)) puzzle[i] = save;
      }
      return { n, solution:sol, puzzle, given:puzzle.map(v=>v!==-1),
               board:puzzle.slice(), targetTime: 30 + n*n*1.1 };
    },
    preview(ctx, s, w){
      const st = this.generate(s.level), n = st.n, cell = w/n;
      ctx.fillStyle = '#131E26'; ctx.fillRect(0,0,w,w);
      for (let i=0;i<n*n;i++){
        if (st.puzzle[i] === -1) continue;
        ctx.fillStyle = st.puzzle[i] === 1 ? '#3FB98A' : '#3A5060';
        ctx.beginPath();
        ctx.arc((i%n)*cell+cell/2, ((i/n)|0)*cell+cell/2, cell*0.32, 0, 7);
        ctx.fill();
      }
    },

    render(root, st){
      const n = st.n;
      root.innerHTML = `<div class="bn" style="--n:${n}" id="bng"></div>
        <p class="hint">Fill every square. No three alike in a row, equal counts per line, and no two lines identical.</p>`;
      const gg = root.querySelector('#bng');
      for (let i=0;i<n*n;i++){
        const d = document.createElement('div');
        d.className = 'bnc' + (st.given[i] ? ' given' : '');
        d.dataset.i = i;
        if (!st.given[i]) d.onclick = () => {
          st.board[i] = st.board[i] === -1 ? 0 : st.board[i] === 0 ? 1 : -1;
          this.paintCell(st, i); Audio2.tap();
          if (this.solved(st)) Host.finish();
        };
        gg.appendChild(d);
      }
      for (let i=0;i<n*n;i++) this.paintCell(st, i);
    },
    paintCell(st, i){
      const el = document.querySelector(`.bnc[data-i="${i}"]`);
      if (!el) return;
      el.classList.toggle('one',  st.board[i] === 1);
      el.classList.toggle('zero', st.board[i] === 0);
    },
    solved(st){ return st.board.every((v,i)=> v === st.solution[i]); },
    serialize(st){ return { board: st.board }; },
    stars(st, s){ return s <= st.targetTime ? 3 : s <= st.targetTime*1.7 ? 2 : 1; }
  };
})();

/* ───────────────────────── FUTOSHIKI ───────────────────────── */
(function(){
  const sizeFor = l => l<=10?4 : l<=20?5 : l<=32?6 : 7;

  function latin(n, rnd){
    const g = new Array(n*n).fill(0);
    const ok = (i,v) => {
      const r=(i/n)|0, c=i%n;
      for (let k=0;k<n;k++){ if (g[r*n+k]===v) return false; if (g[k*n+c]===v) return false; }
      return true;
    };
    const rec = i => {
      if (i === n*n) return true;
      for (const v of shuffle([...Array(n).keys()].map(x=>x+1), rnd))
        if (ok(i,v)){ g[i]=v; if (rec(i+1)) return true; g[i]=0; }
      return false;
    };
    rec(0);
    return g;
  }
  /* constraints: { a, b, } meaning value[a] < value[b] */
  function count(puz, n, cons, limit=2){
    const g = puz.slice();
    let c = 0, guard = 0;
    const consOf = {};                      // indexed once, not rescanned per placement
    for (const q of cons){
      (consOf[q.a] = consOf[q.a] || []).push(q);
      (consOf[q.b] = consOf[q.b] || []).push(q);
    }
    const fits = (i,v) => {
      const r=(i/n)|0, cc=i%n;
      for (let k=0;k<n;k++){
        if (k!==cc && g[r*n+k]===v) return false;
        if (k!==r  && g[k*n+cc]===v) return false;
      }
      for (const q of (consOf[i] || [])){
        if (q.a === i && g[q.b] && !(v < g[q.b])) return false;
        if (q.b === i && g[q.a] && !(g[q.a] < v)) return false;
      }
      return true;
    };
    (function rec(i){
      if (c >= limit || ++guard > 400000) return;
      while (i < n*n && g[i]) i++;
      if (i === n*n){ c++; return; }
      for (let v=1;v<=n;v++){
        if (!fits(i,v)) continue;
        g[i]=v; rec(i+1); g[i]=0;
        if (c >= limit) return;
      }
    })(0);
    return c;
  }

  MODULES.futoshiki = {
    id:'futoshiki', result:'time',

    generate(level){
      const rnd = rngFor('futoshiki', level);
      const n = sizeFor(level);
      const sol = latin(n, rnd);

      /* candidate inequalities between orthogonal neighbours */
      const pairs = [];
      for (let r=0;r<n;r++) for (let c=0;c<n;c++){
        if (c+1<n) pairs.push([r*n+c, r*n+c+1, 'h']);
        if (r+1<n) pairs.push([r*n+c, (r+1)*n+c, 'v']);
      }
      shuffle(pairs, rnd);
      const wanted = Math.round(pairs.length * (0.14 + (level/50)*0.20));
      const cons = pairs.slice(0, wanted).map(([i,j,dir]) =>
        sol[i] < sol[j] ? { a:i, b:j, dir, lt:true } : { a:j, b:i, dir, lt:false });

      /* strip givens as far as uniqueness allows */
      const puzzle = sol.slice();
      const order = shuffle([...Array(n*n).keys()], rnd);
      for (const i of order){
        const save = puzzle[i];
        puzzle[i] = 0;
        if (count(puzzle, n, cons) !== 1) puzzle[i] = save;
      }
      return { n, solution:sol, puzzle, cons, given:puzzle.map(v=>v!==0),
               board:puzzle.slice(), sel:-1, targetTime: 40 + n*n*3 };
    },

    preview(ctx, s, w){
      const st = this.generate(s.level), n = st.n, cell = w/n;
      ctx.fillStyle = '#131E26'; ctx.fillRect(0,0,w,w);
      ctx.strokeStyle = '#243542';
      for (let i=1;i<n;i++){
        ctx.beginPath(); ctx.moveTo(i*cell,0); ctx.lineTo(i*cell,w);
        ctx.moveTo(0,i*cell); ctx.lineTo(w,i*cell); ctx.stroke();
      }
      ctx.fillStyle = '#3FB98A';
      for (let i=0;i<n*n;i++) if (st.puzzle[i])
        ctx.fillRect((i%n)*cell+cell*.35, ((i/n)|0)*cell+cell*.35, cell*.3, cell*.3);
      ctx.fillStyle = '#C9B899';
      for (const q of st.cons){
        const lo = Math.min(q.a,q.b), x = (lo%n)*cell, y = ((lo/n)|0)*cell;
        if (q.dir === 'h') ctx.fillRect(x+cell*.9, y+cell*.42, cell*.2, cell*.16);
        else ctx.fillRect(x+cell*.42, y+cell*.9, cell*.16, cell*.2);
      }
    },

    render(root, st){
      const n = st.n;
      const sym = q => q.dir === 'h' ? (q.a < q.b ? '‹' : '›') : (q.a < q.b ? '⌃' : '⌄');
      root.innerHTML = `<div class="fs" style="--n:${n}" id="fsg"></div>
        <div class="pad" id="fspad" style="grid-template-columns:repeat(${n+1},1fr)"></div>`;
      const gg = root.querySelector('#fsg');
      /* interleaved grid: cells and the gaps between them */
      const tracks = Array(n).fill('1fr').join(' 0.44fr ');
      gg.style.gridTemplateColumns = tracks;
      gg.style.gridTemplateRows = tracks;
      const span = n*2 - 1;
      for (let R=0;R<span;R++) for (let C=0;C<span;C++){
        const d = document.createElement('div');
        if (R%2===0 && C%2===0){
          const i = (R/2)*n + C/2;
          d.className = 'fsc' + (st.given[i] ? ' given' : '');
          d.dataset.i = i;
          d.onclick = () => { st.sel = i; Audio2.tap(); this.paint(st); };
        } else if (R%2===0 || C%2===0){
          d.className = 'fsg-gap';
          const a = R%2===0 ? (R/2)*n + (C-1)/2 : ((R-1)/2)*n + C/2;
          const b = R%2===0 ? a+1 : a+n;
          const q = st.cons.find(x => (x.a===a&&x.b===b)||(x.a===b&&x.b===a));
          if (q) d.textContent = sym(q);
        } else d.className = 'fsg-dot';
        gg.appendChild(d);
      }
      const pad = root.querySelector('#fspad');
      for (let v=1;v<=n;v++){
        const b = document.createElement('button');
        b.textContent = v;
        b.onclick = () => this.enter(st, v);
        pad.appendChild(b);
      }
      const clr = document.createElement('button');
      clr.textContent = '⌫';
      clr.onclick = () => this.enter(st, 0);
      pad.appendChild(clr);
      this.paint(st);
    },

    enter(st, v){
      const i = st.sel;
      if (i < 0 || st.given[i]) return;
      st.board[i] = st.board[i] === v ? 0 : v;
      if (v && st.board[i] !== st.solution[i]){ Audio2.wrong(); haptic(30); }
      else Audio2.place();
      this.paint(st);
      if (this.solved(st)) Host.finish();
    },
    paint(st){
      document.querySelectorAll('.fsc').forEach(el => {
        const i = +el.dataset.i;
        el.textContent = st.board[i] || '';
        el.classList.toggle('sel', i === st.sel);
      });
    },
    solved(st){ return st.board.every((v,i)=> v === st.solution[i]); },
    serialize(st){ return { board: st.board }; },
    stars(st, s){ return s <= st.targetTime ? 3 : s <= st.targetTime*1.7 ? 2 : 1; }
  };
})();

/* ───────────────────────── KAKURO ───────────────────────── */
(function(){
  const sizeFor = l => l<=12?7 : l<=26?8 : l<=40?9 : 9;

  /* Layout with every entry 2–4 cells long. Short entries are what make a
     kakuro deducible rather than a search. */
  function layout(n, rnd){
    const block = new Array(n*n).fill(false);
    for (let i=0;i<n;i++){ block[i] = true; block[i*n] = true; }
    for (let r=1;r<n;r++){
      let run = 0, max = 2 + ((rnd()*4)|0);
      for (let c=1;c<n;c++){
        if (run >= max || rnd() < 0.04){ block[r*n+c] = true; run = 0; max = 2 + ((rnd()*4)|0); }
        else run++;
      }
    }
    for (let c=1;c<n;c++){
      let run = 0, max = 2 + ((rnd()*4)|0);
      for (let r=1;r<n;r++){
        if (block[r*n+c]){ run = 0; max = 2 + ((rnd()*4)|0); continue; }
        if (run >= max){ block[r*n+c] = true; run = 0; max = 2 + ((rnd()*4)|0); }
        else run++;
      }
    }
    /* a white cell must sit in both a horizontal and a vertical entry */
    for (let pass=0; pass<6; pass++){
      let fixed = false;
      const len = (i, dr, dc) => {
        let k = 1, r = (i/n)|0, c = i%n;
        for (let s=1;;s++){ const rr=r+dr*s, cc=c+dc*s; if (rr>=n||cc>=n||block[rr*n+cc]) break; k++; }
        for (let s=1;;s++){ const rr=r-dr*s, cc=c-dc*s; if (rr<1||cc<1||block[rr*n+cc]) break; k++; }
        return k;
      };
      for (let i=0;i<n*n;i++){
        if (block[i]) continue;
        if (len(i,0,1) < 2 || len(i,1,0) < 2){ block[i] = true; fixed = true; }
      }
      if (!fixed) break;
    }
    return block;
  }

  function collectRuns(block, n){
    const runs = [];
    for (let r=1;r<n;r++){
      let run = [];
      for (let c=1;c<=n;c++){
        const i = r*n+c;
        if (c<n && !block[i]) run.push(i);
        else { if (run.length>1) runs.push({ cells:run, dir:'h', head:run[0]-1 }); run = []; }
      }
    }
    for (let c=1;c<n;c++){
      let run = [];
      for (let r=1;r<=n;r++){
        const i = r*n+c;
        if (r<n && !block[i]) run.push(i);
        else { if (run.length>1) runs.push({ cells:run, dir:'v', head:run[0]-n }); run = []; }
      }
    }
    return runs;
  }

  /* smallest / largest total reachable with k distinct digits not already used */
  function bounds(used, k){
    let lo = 0, hi = 0, taken = 0;
    for (let d=1; d<=9 && taken<k; d++) if (!used.has(d)){ lo += d; taken++; }
    taken = 0;
    for (let d=9; d>=1 && taken<k; d--) if (!used.has(d)){ hi += d; taken++; }
    return [lo, hi];
  }

  function solveCount(whites, runsOf, limit, fixed){
    const val = Object.assign({}, fixed || {});
    let count = 0, guard = 0;
    const order = whites.filter(i => !val[i]).sort((a,b) => runsOf[b].length - runsOf[a].length);
    const rec = k => {
      if (count >= limit || ++guard > 500000) return;
      if (k === order.length){ count++; return; }
      const i = order[k];
      for (let v=1; v<=9; v++){
        let ok = true;
        for (const r of runsOf[i]){
          const used = new Set();
          let sum = 0, blanks = 0, dup = false;
          for (const c of r.cells){
            const x = c === i ? v : val[c];
            if (x){ if (used.has(x)){ dup = true; break; } used.add(x); sum += x; }
            else blanks++;
          }
          if (dup){ ok = false; break; }
          if (blanks === 0){ if (sum !== r.sum){ ok = false; break; } continue; }
          const [lo, hi] = bounds(used, blanks);
          if (sum + lo > r.sum || sum + hi < r.sum){ ok = false; break; }
        }
        if (!ok) continue;
        val[i] = v; rec(k+1); delete val[i];
        if (count >= limit) return;
      }
    };
    rec(0);
    return count;
  }

  MODULES.kakuro = {
    id:'kakuro', result:'time',

    generate(level){
      const rnd = rngFor('kakuro', level);
      const n = sizeFor(level);
      let out = null;

      for (let attempt=0; attempt<50 && !out; attempt++){
        const block = layout(n, rnd);
        const whites = [];
        for (let i=0;i<n*n;i++) if (!block[i]) whites.push(i);
        if (whites.length < n*1.5) continue;

        const runs = collectRuns(block, n);
        const runsOf = {};
        whites.forEach(i => runsOf[i] = []);
        runs.forEach(r => r.cells.forEach(c => runsOf[c].push(r)));
        if (whites.some(i => runsOf[i].length !== 2)) continue;

        /* fill with distinct digits per entry */
        const val = {};
        const fill = k => {
          if (k === whites.length) return true;
          const i = whites[k];
          for (const v of shuffle([1,2,3,4,5,6,7,8,9], rnd)){
            if (runsOf[i].some(r => r.cells.some(c => c !== i && val[c] === v))) continue;
            val[i] = v;
            if (fill(k+1)) return true;
            delete val[i];
          }
          return false;
        };
        if (!fill(0)) continue;

        runs.forEach(r => r.sum = r.cells.reduce((a,c)=>a+val[c], 0));

        /* Reveal starter digits until the grid is forced. Higher levels get
           fewer, so the search space you are handed grows with the curve. */
        const pool = shuffle(whites.slice(), rnd);
        const givens = {};
        let p = 0;
        while (solveCount(whites, runsOf, 2, givens) !== 1 && p < pool.length)
          givens[pool[p]] = val[pool[p++]];
        if (p >= pool.length) continue;
        const allowance = Math.ceil(whites.length * (0.34 - (level/50)*0.16));
        if (p > allowance) continue;
        out = { n, block, whites, runs, runsOf, solution:val, givens };
      }

      if (!out){
        /* 22 across / 16 across with a forced pair — verified unique */
        const n2 = 4, block = new Array(n2*n2).fill(true);
        [5,6,9,10].forEach(i => block[i] = false);
        const whites = [5,6,9,10];
        const runs = [
          { cells:[5,6],  dir:'h', head:4, sum:16 },
          { cells:[9,10], dir:'h', head:8, sum:11 },
          { cells:[5,9],  dir:'v', head:1, sum:16 },
          { cells:[6,10], dir:'v', head:2, sum:11 }];
        const runsOf = {}; whites.forEach(i => runsOf[i] = runs.filter(r => r.cells.includes(i)));
        out = { n:n2, block, whites, runs, runsOf, solution:{5:9,6:7,9:7,10:4}, givens:{5:9} };
      }

      const board = {};
      out.whites.forEach(i => board[i] = out.givens[i] || 0);
      return Object.assign(out, { board, sel:-1,
        targetTime: 50 + (out.whites.length - Object.keys(out.givens).length) * 12 });
    },

    countSolutions(whites, runs, _sol, limit=2, givens){
      const runsOf = {};
      whites.forEach(i => runsOf[i] = runs.filter(r => r.cells.includes(i)));
      return solveCount(whites, runsOf, limit, givens);
    },

    preview(ctx, s, w){
      const st = this.generate(s.level), n = st.n, cell = w/n;
      ctx.fillStyle = '#0E151B'; ctx.fillRect(0,0,w,w);
      for (let i=0;i<n*n;i++){
        const x = (i%n)*cell, y = ((i/n)|0)*cell;
        ctx.fillStyle = st.block[i] ? '#1B2731' : '#22323E';
        ctx.fillRect(x+.5, y+.5, cell-1, cell-1);
        if (st.block[i]){
          ctx.strokeStyle = '#3A5060'; ctx.lineWidth = .8;
          ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x+cell, y+cell); ctx.stroke();
        }
      }
      ctx.fillStyle = '#C9B899';
      st.runs.forEach(r => {
        const h = r.head, x = (h%n)*cell, y = ((h/n)|0)*cell;
        ctx.fillRect(r.dir==='h' ? x+cell*.5 : x+cell*.12, r.dir==='h' ? y+cell*.55 : y+cell*.6, cell*.32, cell*.18);
      });
    },

    render(root, st){
      const n = st.n;
      root.innerHTML = `<div class="kk" style="--n:${n}" id="kkg"></div>
        <div class="pad" id="kkpad"></div>`;
      const gg = root.querySelector('#kkg');
      const headMap = {};
      st.runs.forEach(r => { headMap[r.head] = headMap[r.head] || {}; headMap[r.head][r.dir] = r.sum; });
      for (let i=0;i<n*n;i++){
        const d = document.createElement('div');
        if (st.block[i]){
          d.className = 'kkb';
          const h = headMap[i];
          if (h) d.innerHTML = `<span class="dn">${h.v ?? ''}</span><span class="rt">${h.h ?? ''}</span>`;
        } else {
          d.className = 'kkc' + (st.givens[i] ? ' given' : '');
          d.dataset.i = i;
          if (!st.givens[i]) d.onclick = () => { st.sel = i; Audio2.tap(); this.paint(st); };
        }
        gg.appendChild(d);
      }
      const pad = root.querySelector('#kkpad');
      for (let v=1;v<=9;v++){
        const b = document.createElement('button');
        b.textContent = v;
        b.onclick = () => this.enter(st, v);
        pad.appendChild(b);
      }
      const clr = document.createElement('button');
      clr.textContent = '⌫';
      clr.onclick = () => this.enter(st, 0);
      pad.appendChild(clr);
      this.paint(st);
    },

    enter(st, v){
      const i = st.sel;
      if (i < 0 || st.block[i] || st.givens[i]) return;
      st.board[i] = st.board[i] === v ? 0 : v;
      Audio2.place();
      this.paint(st);
      if (this.solved(st)) Host.finish();
    },
    paint(st){
      document.querySelectorAll('.kkc').forEach(el => {
        const i = +el.dataset.i;
        el.textContent = st.board[i] || '';
        el.classList.toggle('sel', i === st.sel);
      });
    },
    solved(st){
      return st.runs.every(r => {
        const vals = r.cells.map(c => st.board[c]);
        if (vals.some(v => !v)) return false;
        if (new Set(vals).size !== vals.length) return false;
        return vals.reduce((a,b)=>a+b,0) === r.sum;
      });
    },
    serialize(st){ return { board: st.board }; },
    stars(st, s){ return s <= st.targetTime ? 3 : s <= st.targetTime*1.7 ? 2 : 1; }
  };
})();

/* ───────────────────────── BRIDGES (HASHI) ───────────────────────── */
(function(){
  const gridFor = l => l<=10?7 : l<=24?8 : l<=38?9 : 10;
  const islandsFor = l => 5 + Math.round((l/50) * 13);

  const key = (a,b) => a < b ? a+'_'+b : b+'_'+a;

  function neighbours(islands, g){
    /* potential links: nearest island in each direction with clear space between */
    const at = {}; islands.forEach(is => at[is.r+','+is.c] = is);
    const links = [];
    islands.forEach(is => {
      [[0,1],[1,0]].forEach(([dr,dc]) => {
        for (let k=1;k<g;k++){
          const r = is.r + dr*k, c = is.c + dc*k;
          if (r>=g || c>=g) break;
          const other = at[r+','+c];
          if (other){ links.push({ a:is.id, b:other.id, r1:is.r, c1:is.c, r2:r, c2:c, dir: dr?'v':'h' }); break; }
        }
      });
    });
    return links;
  }
  function crosses(l1, l2){
    if (l1.dir === l2.dir) return false;
    const h = l1.dir === 'h' ? l1 : l2, v = l1.dir === 'h' ? l2 : l1;
    return h.r1 > Math.min(v.r1,v.r2) && h.r1 < Math.max(v.r1,v.r2)
        && v.c1 > Math.min(h.c1,h.c2) && v.c1 < Math.max(h.c1,h.c2);
  }

  /** Pure-deduction solver over bridge-count intervals. Returns the bridge
      map if the puzzle falls out without guessing, else null. */
  function logicSolve(islands, links, degrees){
    const lo = {}, hi = {};
    links.forEach(l => { const k = key(l.a,l.b); lo[k] = 0; hi[k] = 2; });
    const linksOf = {};
    islands.forEach(is => linksOf[is.id] = links.filter(l => l.a===is.id || l.b===is.id));

    for (let pass=0; pass<400; pass++){
      let changed = false;

      /* a link known to carry traffic blocks anything crossing it */
      for (const l of links){
        const k = key(l.a,l.b);
        if (lo[k] < 1) continue;
        for (const m of links){
          if (m === l) continue;
          const mk = key(m.a,m.b);
          if (hi[mk] > 0 && crosses(l,m)){ hi[mk] = 0; changed = true; }
        }
      }

      for (const is of islands){
        const mine = linksOf[is.id];
        const need = degrees[is.id];
        let sumLo = 0, sumHi = 0;
        mine.forEach(l => { const k = key(l.a,l.b); sumLo += lo[k]; sumHi += hi[k]; });
        if (need < sumLo || need > sumHi) return null;
        for (const l of mine){
          const k = key(l.a,l.b);
          const othersHi = sumHi - hi[k], othersLo = sumLo - lo[k];
          const newLo = Math.max(lo[k], need - othersHi);
          const newHi = Math.min(hi[k], need - othersLo);
          if (newLo > newHi) return null;
          if (newLo !== lo[k]){ lo[k] = newLo; changed = true; }
          if (newHi !== hi[k]){ hi[k] = newHi; changed = true; }
        }
      }
      if (!changed) break;
    }

    for (const l of links) if (lo[key(l.a,l.b)] !== hi[key(l.a,l.b)]) return null;
    const cnt = {};
    links.forEach(l => cnt[key(l.a,l.b)] = lo[key(l.a,l.b)]);
    for (const is of islands){
      const sum = linksOf[is.id].reduce((a,l)=>a+cnt[key(l.a,l.b)], 0);
      if (sum !== degrees[is.id]) return null;
    }
    const seen = new Set([islands[0].id]), stack = [islands[0].id];
    while (stack.length){
      const id = stack.pop();
      linksOf[id].forEach(l => {
        if (cnt[key(l.a,l.b)] > 0){
          const o = l.a === id ? l.b : l.a;
          if (!seen.has(o)){ seen.add(o); stack.push(o); }
        }
      });
    }
    if (seen.size !== islands.length) return null;
    return cnt;
  }

  MODULES.hashi = {
    id:'hashi', result:'time',

    generate(level){
      const rnd = rngFor('hashi', level);
      const g = gridFor(level);
      let out = null;

      /* Aim for the level's island count; if deduction cannot carry a board
         that dense, step the target down rather than serving a toy. */
      for (let want = islandsFor(level); want >= 4 && !out; want -= 2)
      for (let attempt=0; attempt<90 && !out; attempt++){
        const occupied = {};
        const islands = [{ id:0, r:(rnd()*g)|0, c:(rnd()*g)|0 }];
        occupied[islands[0].r+','+islands[0].c] = 0;
        const built = [];

        for (let tries=0; islands.length < want && tries < want*40; tries++){
          const from = islands[(rnd()*islands.length)|0];
          const [dr,dc] = [[0,1],[0,-1],[1,0],[-1,0]][(rnd()*4)|0];
          const dist = 2 + ((rnd()*3)|0);
          const r = from.r + dr*dist, c = from.c + dc*dist;
          if (r<0||c<0||r>=g||c>=g) continue;
          if (occupied[r+','+c] !== undefined) continue;
          /* the new island must not sit on top of a bridge already laid */
          if (built.some(b => b.dir === 'h'
                ? (b.r1 === r && c > Math.min(b.c1,b.c2) && c < Math.max(b.c1,b.c2))
                : (b.c1 === c && r > Math.min(b.r1,b.r2) && r < Math.max(b.r1,b.r2)))) continue;
          /* the path must be clear of islands and of existing bridges */
          let clear = true;
          for (let k=1;k<dist;k++){
            const rr = from.r+dr*k, cc = from.c+dc*k;
            if (occupied[rr+','+cc] !== undefined){ clear = false; break; }
          }
          if (!clear) continue;
          const cand = { r1:from.r, c1:from.c, r2:r, c2:c, dir: dr?'v':'h' };
          if (built.some(b => crosses(b, cand))){ continue; }
          const id = islands.length;
          islands.push({ id, r, c });
          occupied[r+','+c] = id;
          built.push(Object.assign(cand, { a:from.id, b:id, n: rnd() < .45 ? 2 : 1 }));
        }
        if (islands.length < Math.max(4, want-3)) continue;

        /* A tree of bridges reads as flat. Close some loops so the island
           counts actually have to be reasoned about together. */
        const extra = Math.round(islands.length * 0.4);
        const cand = shuffle(neighbours(islands, g), rnd);
        let added = 0;
        for (const l of cand){
          if (added >= extra) break;
          if (built.some(b => key(b.a,b.b) === key(l.a,l.b))) continue;
          if (built.some(b => crosses(b, l))) continue;
          built.push({ a:l.a, b:l.b, r1:l.r1, c1:l.c1, r2:l.r2, c2:l.c2, dir:l.dir,
                       n: rnd() < .35 ? 2 : 1 });
          added++;
        }
        /* thicken a few for variety */
        built.forEach(b => { if (rnd() < .18 && b.n === 1) b.n = 2; });

        const degrees = {};
        islands.forEach(is => degrees[is.id] = 0);
        built.forEach(b => { degrees[b.a] += b.n; degrees[b.b] += b.n; });
        if (Object.values(degrees).some(d => d === 0 || d > 8)) continue;

        const links = neighbours(islands, g);
        if (!built.every(b => links.some(l => key(l.a,l.b) === key(b.a,b.b)))) continue;
        if (!logicSolve(islands, links, degrees)) continue;

        const sol = {};
        links.forEach(l => sol[key(l.a,l.b)] = 0);
        built.forEach(b => sol[key(b.a,b.b)] = b.n);
        out = { g, islands, links, degrees, solution:sol };
      }

      if (!out){   // two islands, one bridge — always valid
        const islands = [{id:0,r:0,c:0},{id:1,r:0,c:2}];
        const links = neighbours(islands, 3);
        out = { g:3, islands, links, degrees:{0:1,1:1}, solution:{ [key(0,1)]:1 } };
      }

      const bridges = {};
      out.links.forEach(l => bridges[key(l.a,l.b)] = 0);
      return Object.assign(out, { bridges, sel:null,
        targetTime: 30 + out.islands.length * 11 });
    },

    preview(ctx, s, w){
      const st = this.generate(s.level), g = st.g, cell = w/g;
      ctx.fillStyle = '#131E26'; ctx.fillRect(0,0,w,w);
      const px = is => [is.c*cell + cell/2, is.r*cell + cell/2];
      ctx.strokeStyle = '#3A5060'; ctx.lineWidth = Math.max(1, cell*.07);
      st.links.forEach(l => {
        const n = st.solution[key(l.a,l.b)];
        if (!n) return;
        const A = st.islands[l.a], B = st.islands[l.b];
        const [x1,y1] = px(A), [x2,y2] = px(B);
        const off = n === 2 ? cell*.1 : 0;
        for (const o of (n === 2 ? [-off, off] : [0])){
          ctx.beginPath();
          ctx.moveTo(x1 + (l.dir==='v'?o:0), y1 + (l.dir==='h'?o:0));
          ctx.lineTo(x2 + (l.dir==='v'?o:0), y2 + (l.dir==='h'?o:0));
          ctx.stroke();
        }
      });
      st.islands.forEach(is => {
        const [x,y] = px(is);
        ctx.beginPath(); ctx.arc(x, y, cell*.32, 0, 7);
        ctx.fillStyle = '#22323E'; ctx.fill();
        ctx.strokeStyle = '#3FB98A'; ctx.lineWidth = Math.max(1, cell*.06); ctx.stroke();
      });
    },

    render(root, st){
      root.innerHTML = `<canvas id="hs" class="hs"></canvas>
        <p class="hint">Tap two islands to lay a bridge. Tap again for a double, once more to clear.
        Bridges never cross, and every island must end up connected.</p>`;
      const cv = root.querySelector('#hs');
      const dpr = window.devicePixelRatio || 1;
      const size = Math.min(root.clientWidth, window.innerHeight * 0.62);
      cv.width = size*dpr; cv.height = size*dpr;
      cv.style.width = size+'px'; cv.style.height = size+'px';
      st._ctx = cv.getContext('2d'); st._ctx.scale(dpr, dpr); st._size = size;
      cv.onclick = e => {
        const rect = cv.getBoundingClientRect(), cell = size/st.g;
        const c = Math.floor((e.clientX - rect.left)/cell), r = Math.floor((e.clientY - rect.top)/cell);
        const hit = st.islands.find(is => is.r === r && is.c === c);
        if (!hit){ st.sel = null; return this.draw(st); }
        if (st.sel === null || st.sel === hit.id){ st.sel = st.sel === hit.id ? null : hit.id; Audio2.tap(); return this.draw(st); }
        const l = st.links.find(x => key(x.a,x.b) === key(st.sel, hit.id));
        if (!l){ st.sel = hit.id; Audio2.wrong(); return this.draw(st); }
        const k = key(l.a, l.b);
        const next = (st.bridges[k] + 1) % 3;
        /* refuse a crossing */
        if (next > 0 && st.links.some(m => m !== l && st.bridges[key(m.a,m.b)] > 0 && crosses(l, m))){
          Audio2.wrong(); haptic(30); st.sel = null; return this.draw(st);
        }
        st.bridges[k] = next;
        Audio2.place(); st.sel = null;
        this.draw(st);
        if (this.solved(st)) Host.finish();
      };
      this.draw(st);
    },

    draw(st){
      const ctx = st._ctx, size = st._size, cell = size/st.g;
      ctx.clearRect(0,0,size,size);
      const px = is => [is.c*cell + cell/2, is.r*cell + cell/2];
      ctx.lineWidth = Math.max(2, cell*.06);
      st.links.forEach(l => {
        const n = st.bridges[key(l.a,l.b)];
        if (!n) return;
        const [x1,y1] = px(st.islands[l.a]), [x2,y2] = px(st.islands[l.b]);
        ctx.strokeStyle = '#3FB98A';
        const off = n === 2 ? cell*.11 : 0;
        for (const o of (n === 2 ? [-off, off] : [0])){
          ctx.beginPath();
          ctx.moveTo(x1 + (l.dir==='v'?o:0), y1 + (l.dir==='h'?o:0));
          ctx.lineTo(x2 + (l.dir==='v'?o:0), y2 + (l.dir==='h'?o:0));
          ctx.stroke();
        }
      });
      st.islands.forEach(is => {
        const [x,y] = px(is);
        const used = st.links.filter(l => l.a===is.id||l.b===is.id)
                             .reduce((a,l)=>a+st.bridges[key(l.a,l.b)], 0);
        const done = used === st.degrees[is.id];
        ctx.beginPath(); ctx.arc(x, y, cell*.33, 0, 7);
        ctx.fillStyle = '#1A2731'; ctx.fill();
        ctx.strokeStyle = st.sel === is.id ? '#E8F1EE' : done ? '#3FB98A' : '#3A5060';
        ctx.lineWidth = st.sel === is.id ? 3 : 2; ctx.stroke();
        ctx.fillStyle = done ? '#3FB98A' : '#E8F1EE';
        ctx.font = `700 ${Math.round(cell*.36)}px 'Space Mono', monospace`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(st.degrees[is.id], x, y+1);
      });
    },

    solved(st){
      for (const is of st.islands){
        const used = st.links.filter(l => l.a===is.id||l.b===is.id)
                             .reduce((a,l)=>a+st.bridges[key(l.a,l.b)], 0);
        if (used !== st.degrees[is.id]) return false;
      }
      const seen = new Set([st.islands[0].id]), stack = [st.islands[0].id];
      while (stack.length){
        const id = stack.pop();
        st.links.forEach(l => {
          if (st.bridges[key(l.a,l.b)] > 0 && (l.a===id||l.b===id)){
            const o = l.a === id ? l.b : l.a;
            if (!seen.has(o)){ seen.add(o); stack.push(o); }
          }
        });
      }
      return seen.size === st.islands.length;
    },
    serialize(st){ return { bridges: st.bridges }; },
    stars(st, s){ return s <= st.targetTime ? 3 : s <= st.targetTime*1.7 ? 2 : 1; }
  };
})();

/* ───────────────────────── MINEFIELD ───────────────────────── */
(function(){
  const specFor = l => {
    const t = (l-1)/49;
    const w = Math.round(8 + t*4), h = Math.round(8 + t*8);
    return { w, h, mines: Math.round(w*h*(0.12 + t*0.08)) };
  };

  /** No-guess check: solve with counting rules plus subset elimination. */
  function noGuess(mines, w, h, start){
    const N = w*h;
    const idx = (r,c) => r*w+c;
    const nb = i => {
      const r = (i/w)|0, c = i%w, out = [];
      for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++){
        if (!dr && !dc) continue;
        const rr = r+dr, cc = c+dc;
        if (rr>=0 && cc>=0 && rr<h && cc<w) out.push(idx(rr,cc));
      }
      return out;
    };
    const num = new Array(N).fill(0);
    for (let i=0;i<N;i++) if (!mines[i]) num[i] = nb(i).filter(j=>mines[j]).length;

    const open = new Set(), flag = new Set();
    const reveal = i => {
      if (open.has(i) || flag.has(i) || mines[i]) return;
      const stack = [i];
      while (stack.length){
        const k = stack.pop();
        if (open.has(k) || mines[k]) continue;
        open.add(k);
        if (num[k] === 0) nb(k).forEach(j => { if (!open.has(j)) stack.push(j); });
      }
    };
    reveal(start);
    if (open.size === 0) return false;

    for (let pass=0; pass<N*2; pass++){
      let changed = false;
      const cons = [];
      for (const i of open){
        const hidden = nb(i).filter(j => !open.has(j) && !flag.has(j));
        const flagged = nb(i).filter(j => flag.has(j)).length;
        if (!hidden.length) continue;
        const need = num[i] - flagged;
        if (need === 0){ hidden.forEach(j => { reveal(j); changed = true; }); continue; }
        if (need === hidden.length){ hidden.forEach(j => { flag.add(j); changed = true; }); continue; }
        cons.push({ cells:new Set(hidden), need });
      }
      if (!changed){
        /* subset rule: if A ⊂ B then B\A carries need(B) − need(A) */
        outer:
        for (const A of cons) for (const B of cons){
          if (A === B || A.cells.size >= B.cells.size) continue;
          let sub = true;
          for (const c of A.cells) if (!B.cells.has(c)){ sub = false; break; }
          if (!sub) continue;
          const diff = [...B.cells].filter(c => !A.cells.has(c));
          const need = B.need - A.need;
          if (need === 0){ diff.forEach(j => reveal(j)); changed = true; break outer; }
          if (need === diff.length){ diff.forEach(j => flag.add(j)); changed = true; break outer; }
        }
      }
      if (!changed) break;
    }
    return open.size + flag.size === N && [...flag].every(i => mines[i]);
  }

  MODULES.minesweeper = {
    id:'minesweeper', result:'time',

    generate(level){
      const rnd = rngFor('minesweeper', level);
      const { w, h, mines:M } = specFor(level);
      const N = w*h;
      let mines = null, start = 0;

      for (let attempt=0; attempt<160 && !mines; attempt++){
        const m = new Array(N).fill(false);
        const s = (rnd()*N)|0;
        const sr = (s/w)|0, sc = s%w;
        const safe = new Set();
        for (let dr=-1;dr<=1;dr++) for (let dc=-1;dc<=1;dc++){
          const rr = sr+dr, cc = sc+dc;
          if (rr>=0&&cc>=0&&rr<h&&cc<w) safe.add(rr*w+cc);
        }
        const spots = shuffle([...Array(N).keys()].filter(i => !safe.has(i)), rnd);
        for (let k=0;k<M && k<spots.length;k++) m[spots[k]] = true;
        if (noGuess(m, w, h, s)){ mines = m; start = s; }
      }
      if (!mines){   // fall back to a light field, still fully solvable in practice
        mines = new Array(N).fill(false);
        const spots = shuffle([...Array(N).keys()], rnd).slice(0, Math.round(M*0.6));
        spots.forEach(i => mines[i] = true);
