    solved(st){ return st.round >= st.target && st.pos >= st.round; },
    serialize(st){ return { moves: st.inputs }; },
    score(st){ return st.round * 100; },
    stars(st){
      const t = st.target;
      return st.round >= t ? 3 : st.round >= t*0.8 ? 2 : st.round >= t*0.6 ? 1 : 0;
    }
  };
})();

/* ───────────────────────── MASTERMIND ───────────────────────── */
(function(){
  const lenFor    = l => l<=25 ? 4 : 5;
  const colorsFor = l => Math.min(8, 6 + Math.round((l/50)*2));
  const MAX = 10;
  const COLS = ['#3FB98A','#E0457B','#58B8D8','#C9B899','#E08A45','#9B7BE0','#4BD6C0','#E8E14B'];

  function marks(guess, code){
    let black = 0, white = 0;
    const gc = {}, cc = {};
    guess.forEach((g,i) => {
      if (g === code[i]) black++;
      else { gc[g] = (gc[g]||0)+1; cc[code[i]] = (cc[code[i]]||0)+1; }
    });
    for (const k in gc) white += Math.min(gc[k], cc[k]||0);
    return { black, white };
  }

  MODULES.mastermind = {
    id:'mastermind', result:'score',

    start(level){
      const rnd = rngFor('mastermind', level);
      const len = lenFor(level), colors = colorsFor(level);
      const code = [];
      for (let i=0;i<len;i++) code.push((rnd()*colors)|0);
      return { code, len, colors, guesses:[], draft:[], par: len + 2 };
    },
    generate(level){ return this.start(level); },

    replay(level, moves){
      if (!Array.isArray(moves) || moves.length > MAX) return { ok:false, reason:'too many guesses' };
      const st = this.start(level);
      for (const g of moves){
        if (!Array.isArray(g) || g.length !== st.len) return { ok:false, reason:'malformed guess' };
        if (g.some(v => !Number.isInteger(v) || v < 0 || v >= st.colors)) return { ok:false, reason:'colour out of range' };
        st.guesses.push(g);
      }
      return { ok:true, st };
    },

    preview(ctx, s, w){
      const st = this.generate(s.level), n = st.len;
      ctx.fillStyle = '#131E26'; ctx.fillRect(0,0,w,w);
      const r = w/(n*2.6);
      st.code.forEach((c, i) => {
        ctx.beginPath();
        ctx.arc(w*(i+0.5)/n, w*0.5, r, 0, 7);
        ctx.fillStyle = COLS[c]; ctx.fill();
      });
      ctx.fillStyle = '#22323E';
      ctx.fillRect(0, w*0.5 - r*1.6, w, r*3.2);
      st.code.forEach((c, i) => {
        ctx.beginPath();
        ctx.arc(w*(i+0.5)/n, w*0.5, r*0.55, 0, 7);
        ctx.fillStyle = '#33485A'; ctx.fill();
      });
    },

    render(root, st){
      root.innerHTML = `<div class="movebar"><span class="lbl">guesses</span><b id="mm-g">0</b>
          <span class="lbl">of</span><b>${MAX}</b></div>
        <div class="mmrows" id="mmr"></div>
        <div class="mmdraft" id="mmd"></div>
        <div class="mmpal" id="mmp"></div>
        <div class="row"><button class="btn" id="mm-go">Submit guess</button></div>`;
      const pal = root.querySelector('#mmp');
      for (let c=0;c<st.colors;c++){
        const b = document.createElement('button');
        b.className = 'mmc'; b.style.background = COLS[c];
        b.onclick = () => {
          if (st.draft.length >= st.len) return;
          st.draft.push(c); Audio2.tap(); this.paint(st);
        };
        pal.appendChild(b);
      }
      root.querySelector('#mmd').onclick = () => { st.draft.pop(); Audio2.tap(); this.paint(st); };
      root.querySelector('#mm-go').onclick = () => {
        if (st.draft.length !== st.len) return Audio2.wrong();
        st.guesses.push(st.draft.slice());
        st.draft = [];
        Audio2.place();
        this.paint(st);
        if (this.solved(st)) return Host.finish();
        if (st.guesses.length >= MAX) Host.finish();
      };
      this.paint(st);
    },

    paint(st){
      const rows = document.getElementById('mmr');
      if (rows){
        rows.innerHTML = st.guesses.map(g => {
          const { black, white } = marks(g, st.code);
          return `<div class="mmrow">
            ${g.map(c=>`<span class="mmp" style="background:${COLS[c]}"></span>`).join('')}
            <span class="mmk">${'●'.repeat(black)}${'○'.repeat(white)}</span></div>`;
        }).join('');
        rows.scrollTop = rows.scrollHeight;
      }
      const d = document.getElementById('mmd');
      if (d) d.innerHTML = Array.from({length: st.len}, (_,i) =>
        `<span class="mmp ${st.draft[i]===undefined?'empty':''}"
           style="${st.draft[i]!==undefined?`background:${COLS[st.draft[i]]}`:''}"></span>`).join('');
      const g = document.getElementById('mm-g');
      if (g) g.textContent = st.guesses.length;
    },

    solved(st){
      const last = st.guesses[st.guesses.length-1];
      return !!last && last.every((v,i) => v === st.code[i]);
    },
    serialize(st){ return { moves: st.guesses }; },
    score(st){
      if (!this.solved(st)) return 0;
      return Math.min(1000, Math.round(1000 * st.par / Math.max(st.guesses.length, st.par)));
    },
    stars(st){
      if (!this.solved(st)) return 0;
      const n = st.guesses.length;
      return n <= st.par ? 3 : n <= st.par + 2 ? 2 : 1;
    }
  };
})();

/* ───────────────────────── SCRAMBLE ───────────────────────── */
(function(){
  /* Kept short and common on purpose: the answer is checked by equality,
     so no dictionary needs to ship with the app. */
  const WORDS = (
    'tide reef kelp sand wave salt foam surf dune crab fish bird ' +
    'coral beach shore ocean storm cliff whale shark pearl water plant shell ' +
    'anchor island lagoon marine harbor breeze sunset ripple pebble ' +
    'current channel drifted seaweed tidepool mariner offshore seabird ' +
    'plankton nautical driftwood shipwreck lighthouse'
  ).split(' ').filter(w => w.length >= 4);

  const wordFor = level => {
    const pool = WORDS.filter(w => w.length >= 4 + Math.floor((level-1)/12));
    const list = pool.length ? pool : WORDS;
    const rnd = rngFor('wordscram', level);
    return list[(rnd() * list.length) | 0];
  };

  MODULES.wordscram = {
    id:'wordscram', result:'score',

    start(level){
      const word = wordFor(level);
      const rnd = rngFor('wordscram', level + 1000);
      let letters = shuffle(word.split(''), rnd);
      if (letters.join('') === word) letters = letters.reverse();
      return { word, letters, slots:new Array(word.length).fill(null), pool:letters.slice() };
    },
    generate(level){ return this.start(level); },

    replay(level, moves){
      const st = this.start(level);
      const answer = Array.isArray(moves) ? moves.join('') : String(moves || '');
      if (answer !== st.word) return { ok:false, reason:'not the word' };
      return { ok:true, st };
    },

    preview(ctx, s, w){
      const st = this.generate(s.level), n = st.letters.length;
      ctx.fillStyle = '#131E26'; ctx.fillRect(0,0,w,w);
      const cell = Math.min(w/n, w/4);
      ctx.font = `700 ${Math.round(cell*.5)}px 'Space Mono', monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      st.letters.forEach((ch, i) => {
        const x = (w - n*cell)/2 + i*cell;
        ctx.fillStyle = '#22323E';
        ctx.fillRect(x+2, w/2 - cell/2, cell-4, cell);
        ctx.fillStyle = '#C9B899';
        ctx.fillText(ch.toUpperCase(), x + cell/2, w/2);
      });
    },

    render(root, st){
      root.innerHTML = `<p class="hint" style="margin-top:4px">Rebuild the word. Tap letters to place them, tap again to take them back.</p>
        <div class="wsslots" id="wss"></div>
        <div class="wspool" id="wsp"></div>
        <div class="row"><button class="btn ghost" id="ws-clear">Clear</button></div>`;
      root.querySelector('#ws-clear').onclick = () => {
        st.slots.fill(null); st.pool = st.letters.slice();
        Audio2.tap(); this.paint(st);
      };
      this.paint(st);
    },

    paint(st){
      const slots = document.getElementById('wss');
      if (slots){
        slots.innerHTML = st.slots.map((ch,i) =>
          `<button class="wst ${ch?'':'empty'}" data-s="${i}">${ch ? ch.toUpperCase() : ''}</button>`).join('');
        slots.querySelectorAll('.wst').forEach(b => b.onclick = () => {
          const i = +b.dataset.s;
          if (!st.slots[i]) return;
          st.pool.push(st.slots[i]);
          st.slots[i] = null;
          Audio2.tap(); this.paint(st);
        });
      }
      const pool = document.getElementById('wsp');
      if (pool){
        pool.innerHTML = st.pool.map((ch,i) =>
          `<button class="wst" data-p="${i}">${ch.toUpperCase()}</button>`).join('');
        pool.querySelectorAll('.wst').forEach(b => b.onclick = () => {
          const i = +b.dataset.p;
          const free = st.slots.indexOf(null);
          if (free < 0) return;
          st.slots[free] = st.pool[i];
          st.pool.splice(i, 1);
          Audio2.place();
          this.paint(st);
          if (this.solved(st)) Host.finish();
        });
      }
    },

    solved(st){ return st.slots.every(Boolean) && st.slots.join('') === st.word; },
    serialize(st){ return { moves: st.slots }; },
    score(st, seconds){ return Math.max(50, Math.round(1200 - seconds * 12)); },
    stars(st, seconds){
      const t = st.word.length * 4;
      return seconds <= t ? 3 : seconds <= t*2 ? 2 : 1;
    }
  };
})();

/* ═══════════════════════════════════════════════════════════════
   GAME HOST — timer, HUD, pause, result, submission, reactions
   ═══════════════════════════════════════════════════════════════ */
const Host = {
  mod:null, st:null, game:null, level:1, t0:0, elapsed:0, tick:null, paused:false, done:false,
  challengeId:null, token:0,

  open(gameId, level, challengeId = null){
    const mod = MODULES[gameId];
    if (!mod){ toast(byId(gameId).name + ' arrives in a later update'); return go('#/home'); }
    this.mod = mod; this.game = byId(gameId); this.level = level;
    this.challengeId = challengeId; this.done = false; this.paused = false;
    this.elapsed = 0;

    const app = document.getElementById('app');
    app.innerHTML = `
      <div id="game-screen">
        <div class="hud">
          <button id="g-back" aria-label="Back to levels">‹</button>
          <div class="grow">
            <div class="lbl">${this.game.name} · level ${level}</div>
            <div class="clock" id="g-clock">0:00</div>
          </div>
          <button id="g-sound" aria-label="Sound">${Audio2.on?'🔊':'🔇'}</button>
          <button id="g-pause" aria-label="Pause">❚❚</button>
        </div>
        <div id="board"></div>
      </div>`;
    document.getElementById('tabs').classList.add('hidden');
    app.querySelector('#g-back').onclick  = () => go('#/levels/' + gameId);
    app.querySelector('#g-pause').onclick = () => this.pause();
    app.querySelector('#g-sound').onclick = e => e.currentTarget.textContent = Audio2.toggle() ? '🔊' : '🔇';

    /* Some levels verify uniqueness before they are handed over, which can
       take a beat. Paint the frame first so that reads as work, not a freeze,
       and never start the clock until the board is actually up. */
    const board = document.getElementById('board');
    board.innerHTML = '<div class="building"><span></span>Building level ' + level + '…</div>';
    const token = ++this.token;
    setTimeout(() => {
      if (token !== this.token) return;        // player navigated away mid-build
      try{
        this.st = mod.generate(level);
      }catch(e){
        console.error(e);
        return toast('That level could not be built.');
      }
      if (token !== this.token) return;
      board.innerHTML = '';
      mod.render(board, this.st);
      this.t0 = Date.now();
      this.paintClock();
      this.tick = setInterval(()=>this.paintClock(), 250);
    }, 30);
  },

  paintClock(){
    if (this.paused || this.done) return;
    this.elapsed = (Date.now() - this.t0) / 1000;
    const el = document.getElementById('g-clock');
    if (el) el.textContent = fmtTime(this.elapsed);
  },

  pause(){
    if (!this.st) return;
    this.paused = true;
    const at = Date.now();
    sheet(`
      <div class="eyebrow">paused</div>
      <h2 style="font-size:28px;margin:6px 0 4px">${this.game.name}</h2>
      <p style="color:var(--mute);margin:0">Level ${this.level} · ${fmtTime(this.elapsed)} elapsed</p>
      <div class="row"><button class="btn" id="p-resume">Resume</button></div>
      <div class="row">
        <button class="btn ghost" id="p-restart">Restart level</button>
        <button class="btn ghost" id="p-quit">Leave</button>
      </div>`, {
      dismissable:false,
      wire(el, close){
        el.querySelector('#p-resume').onclick = () => {
          Host.t0 += Date.now() - at; Host.paused = false; close();
        };
        el.querySelector('#p-restart').onclick = () => { close(); Host.open(Host.game.id, Host.level); };
        el.querySelector('#p-quit').onclick = () => { close(); Host.stop(); go('#/levels/' + Host.game.id); };
      }
    });
  },

  stop(){ clearInterval(this.tick); this.tick = null; this.token++; },

  async finish(){
    if (this.done || !this.st) return;
    this.done = true; this.stop();
    this.elapsed = (Date.now() - this.t0) / 1000;
    Audio2.win(); haptic([25,50,25]);
    const board = document.getElementById('board');
    if (board) board.classList.add('solved');

    const seconds = Math.round(this.elapsed * 100) / 100;
    const value = this.game.result === 'time' ? seconds
                : (this.mod.score ? this.mod.score(this.st, seconds) : (this.st.score ?? 0));
    const stars = this.mod.stars(this.st, seconds);
    const cleared = stars > 0;                  // score chasers can finish without clearing
    const prev  = Progress.best(this.game.id, this.level);
    const isPB  = cleared && Progress.record(this.game.id, this.level,
                    { resultType:this.game.result, value, stars, at:Date.now() });

    this.showResult({ value, stars, isPB, prev, cleared });

    try{
      const r = await api('submit', {
        gameId:this.game.id, level:this.level,
        resultType:this.game.result, value, stars,
        elapsed:seconds, solution:this.mod.serialize(this.st),
        challengeId:this.challengeId
      });
      if (r && !r.offline) this.paintRank(r);
    }catch(e){ /* keep the local result; sync later */ }
  },

  showResult({ value, stars, isPB, prev, cleared }){
    const g = this.game;
    const nextLv = Math.min(50, this.level + 1);
    const target = this.st.target;
    sheet(`
      <div class="eyebrow">${!cleared ? 'run over' : isPB ? 'new personal best' : 'solved'}</div>
      <div class="result-time">${g.result === 'time' ? fmtTime(value) : value.toLocaleString()}</div>
      <div style="color:var(--mute);font-size:13px">
        ${g.name} · level ${this.level}
        ${target && !cleared ? ' · needed ' + target : ''}
        ${prev && !isPB ? ' · best ' + (g.result==='time'?fmtTime(prev.value):prev.value) : ''}
      </div>
      <div class="stars">${[1,2,3].map(i=>`<span class="${i<=stars?'':'dim'}">★</span>`).join('')}</div>
      <div id="r-rank" class="mono" style="font-size:12px;color:var(--mute);min-height:17px"></div>
      ${this.challengeId ? `<div class="emojibar" id="r-emoji">
        ${['🔥','🧠','😤','🐌','👏','💀'].map(e=>`<button data-e="${e}">${e}</button>`).join('')}
      </div>` : ''}
      <div class="row">
        ${cleared
          ? `<button class="btn ghost" id="r-again">Replay</button>
             <button class="btn" id="r-next">Level ${nextLv} ›</button>`
          : `<button class="btn" id="r-again">Try again</button>`}
      </div>
      <div class="row"><button class="btn ghost" id="r-chal">Challenge a friend on this level</button></div>`, {
      wire:(el, close)=>{
        el.querySelector('#r-again').onclick = () => { close(); Host.open(g.id, this.level); };
        const nx = el.querySelector('#r-next');
        if (nx) nx.onclick = () => { close(); Host.open(g.id, nextLv); };
        el.querySelector('#r-chal').onclick  = () => { close(); go(`#/challenge/${g.id}/${this.level}`); };
        el.querySelectorAll('#r-emoji button').forEach(b => b.onclick = () => {   // challenges only
          el.querySelectorAll('#r-emoji button').forEach(x=>x.classList.remove('picked'));
          b.classList.add('picked'); Audio2.tap();
          api('react', { challengeId:Host.challengeId, gameId:g.id, level:Host.level, emoji:b.dataset.e }).catch(()=>{});
        });
      }
    });
  },

  paintRank(r){
    const el = document.getElementById('r-rank');
    if (!el) return;
    const bits = [];
    if (r.rank)    bits.push(`global #${r.rank} of ${r.total}`);
    if (r.percent) bits.push(`top ${r.percent}%`);
    if (r.xp)      bits.push(`+${r.xp} xp`);
    el.textContent = bits.join('  ·  ');
  }
};

/* ═══════════════════════════════════════════════════════════════
   SCREENS
   ═══════════════════════════════════════════════════════════════ */
const State = { user:null, profile:null, unread:0 };
const $app = () => document.getElementById('app');

function fmtTime(s){
  s = Math.max(0, s);
  const m = Math.floor(s/60), r = s - m*60;
  return m + ':' + (r < 10 ? '0' : '') + (s < 60 ? r.toFixed(1) : Math.floor(r));
}
function toast(msg){
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  t.setAttribute('role', 'status');
  t.setAttribute('aria-live', 'polite');
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2600);
}
function sheet(html, opts = {}){
  const w = document.createElement('div');
  w.className = 'sheet';
  w.setAttribute('role', 'dialog');
  w.setAttribute('aria-modal', 'true');
  w.innerHTML = `<div class="card">${html}</div>`;
  const close = () => w.remove();
  if (opts.dismissable !== false) w.onclick = e => { if (e.target === w) close(); };
  document.body.appendChild(w);
  opts.wire && opts.wire(w, close);
  return close;
}


/* ── auth diagnostics ──────────────────────────────────────────
   Supabase returns an empty body on some failures, which used to
   surface as a bare "{}". Translate what we get into something the
   person can act on. */
function authError(e){
  const raw  = String((e && (e.message || e.error_description || e.error)) || '').trim();
  const code = e && (e.status || e.statusCode);
  const http = code ? ' (HTTP ' + code + ')' : '';
  if (!raw || raw === '{}' || raw === '[object Object]')
    return 'The server rejected that without saying why' + http +
           '. That is almost always the database setup — re-run supabase/schema.sql ' +
           'in the Supabase SQL editor, then try again.';
  if (/database error/i.test(raw))
    return 'The database refused to create the account. Re-run supabase/schema.sql ' +
           'in the Supabase SQL editor, then try again.';
  if (/already registered|already exists|user_repeated/i.test(raw))
    return 'That email already has an account. Try signing in instead.';
  if (/signups? (not allowed|disabled)/i.test(raw))
    return 'Sign-ups are turned off in Supabase. Enable them under Authentication → Providers.';
  if (/invalid login/i.test(raw))
    return 'Wrong email or password.';
  if (/failed to fetch|networkerror|load failed/i.test(raw))
    return 'Could not reach the server. Check TIDEPOOL_URL in index.html and your connection.';
  if (/password/i.test(raw) && /least|short/i.test(raw))
    return 'That password is too short — Supabase wants at least six characters.';
  return raw + http;
}

/** Ping Supabase and say plainly what is and is not working. */
async function testConnection(report){
  if (OFFLINE)
    return report('No Supabase URL or key is set. Add window.TIDEPOOL_URL and window.TIDEPOOL_KEY to index.html.');
  report('Checking…', true);
  try{
    const base = CFG.SUPABASE_URL.replace(/\/+$/, '');
    const res = await fetch(base + '/auth/v1/settings', { headers:{ apikey: CFG.SUPABASE_KEY } });
    if (res.status === 401 || res.status === 403)
      return report('Reached the server, but the anon key is wrong (HTTP ' + res.status +
                    '). Copy it again from Project Settings → API.');
    if (!res.ok)
      return report('The server answered HTTP ' + res.status + '. Check the project URL.');
    const s = await res.json().catch(()=>({}));
    const bits = ['Connected to Supabase.'];
    if (s.disable_signup === true) bits.push('Sign-ups are DISABLED — turn them on under Authentication → Providers.');
    else bits.push('Sign-ups are on.');
    if (s.mailer_autoconfirm === false) bits.push('Email confirmation is required, so check your inbox.');
    report(bits.join(' '), s.disable_signup !== true);
  }catch(e){
    report('Could not reach that URL at all. Check TIDEPOOL_URL and your connection.');
  }
}

/* ── auth ── */
function screenAuth(mode = 'login'){
  document.getElementById('tabs').classList.add('hidden');
  const signup = mode === 'signup';
  $app().innerHTML = `
  <div class="screen">
    <div class="masthead" style="margin-top:8vh">
      <h1>Tide<em>pool</em></h1>
      <p>Twenty classic puzzles, fifty levels each. Every level is the same for everyone — so the times mean something.</p>
    </div>
    <div class="field"><label>Email</label><input id="a-email" type="email" autocomplete="email" inputmode="email"></div>
    ${signup ? '<div class="field"><label>Username</label><input id="a-user" autocomplete="nickname" maxlength="18"></div>' : ''}
    <div class="field"><label>Password</label><input id="a-pass" type="password" autocomplete="${signup?'new-password':'current-password'}"></div>
    <div class="msg hidden" id="a-msg"></div>
    <div class="row"><button class="btn" id="a-go">${signup ? 'Create account' : 'Sign in'}</button></div>
    <div class="linkish" id="a-swap">${signup ? 'Already play here? <b>Sign in</b>' : 'New here? <b>Create an account</b>'}</div>
    <div class="linkish" id="a-guest" style="margin-top:26px">Or <b>play as a guest</b> — no leaderboards, no friends</div>
    <div class="linkish" id="a-test" style="margin-top:14px;font-size:12.5px"><b>Test connection</b></div>
  </div>`;
  const msg = (t, ok) => {
    const m = document.getElementById('a-msg');
    m.textContent = t; m.className = 'msg' + (ok ? ' ok' : '');
  };
  document.getElementById('a-swap').onclick  = () => screenAuth(signup ? 'login' : 'signup');
  document.getElementById('a-guest').onclick = () => { State.user = null; go('#/home'); };
  document.getElementById('a-test').onclick  = () => testConnection(msg);
  document.getElementById('a-go').onclick = async () => {
    const email = document.getElementById('a-email').value.trim();
    const pass  = document.getElementById('a-pass').value;
    const uname = signup ? document.getElementById('a-user').value.trim() : '';
    if (!email || !pass) return msg('Enter an email and password.');
    if (signup && uname.length < 3) return msg('Pick a username of 3 characters or more.');
    if (OFFLINE) return msg('No server configured. Play as a guest for now.');
    const btn = document.getElementById('a-go');
    btn.disabled = true; btn.textContent = signup ? 'Creating…' : 'Signing in…';
    try{
      if (signup){
        const { data, error } = await sb.auth.signUp({ email, password:pass, options:{ data:{ username:uname } } });
        if (error) throw error;
        if (data && data.session) return await boot();     // confirmation off: sign straight in
        msg('Account created. Check your email to confirm, then sign in.', true);
        btn.disabled = false; btn.textContent = 'Create account';
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password:pass });
        if (error) throw error;
        await boot();
      }
    }catch(e){
      console.error('[tidepool auth]', e);
      msg(authError(e));
      btn.disabled = false; btn.textContent = signup ? 'Create account' : 'Sign in';
    }
  };
}

/* ── home ── */
function screenHome(){
  const prog = Progress.load();
  const total = Object.keys(prog).length;
  $app().innerHTML = `
  <div class="screen">
    <div class="masthead">
      <h1>Tide<em>pool</em></h1>
      <p>${State.profile ? 'Back again, ' + State.profile.username + '.' : 'Playing as a guest.'}</p>
      <div class="streak"><span>Levels cleared</span><b>${total}</b><span>/ 1000</span></div>
    </div>
    <button class="daily" id="h-daily" aria-label="Today's puzzle"></button>
    <div class="grid" id="h-grid"></div>
  </div>`;
  const pick = dailyPick(todayStr());
  const dg = byId(pick.gameId);
  const dDone = Progress.best(pick.gameId, pick.level);
  const dEl = document.getElementById('h-daily');
  dEl.innerHTML = `
    <div class="eyebrow">today · same board for everyone</div>
    <h3>${dg.name} · level ${pick.level}</h3>
    <p>${dDone ? 'Done — ' + (dg.result === 'time' ? fmtTime(dDone.value) : dDone.value) + '. See where that puts you.'
               : (dg.result === 'time' ? 'Fastest time takes the day.' : 'Highest score takes the day.')}</p>`;
  dEl.onclick = () => go('#/daily');

  const grid = document.getElementById('h-grid');
  GAMES.forEach(g => {
    const mod = MODULES[g.id];
    const cleared = Progress.cleared(g.id);
    const next = Progress.nextLevel(g.id);
    const el = document.createElement('button');
    el.className = 'tile' + (mod ? '' : ' locked');
    el.innerHTML = `
      <canvas width="200" height="200"></canvas>
      <div class="tname">${g.name}</div>
      <div class="tmeta"><span class="prog">${cleared}/50</span><span>${g.result === 'time' ? 'TIME' : 'SCORE'}</span></div>`;
    el.onclick = () => mod ? go('#/levels/' + g.id) : toast(g.name + ' arrives in a later update');
    grid.appendChild(el);
    const cv = el.querySelector('canvas');
    if (mod && mod.preview) requestAnimationFrame(()=>mod.preview(cv.getContext('2d'), { level: next }, 200));
    else {
      const c = cv.getContext('2d');
      c.fillStyle = '#131E26'; c.fillRect(0,0,200,200);
      c.fillStyle = '#243542';
      const rnd = rngFor(g.id, 1);
      for (let i=0;i<64;i++) if (rnd() > .55) c.fillRect((i%8)*25+7, ((i/8)|0)*25+7, 11, 11);
    }
  });
  setTab('play');
}

/* ── level map ── */
function screenLevels(gameId){
  const g = byId(gameId);
  const prog = Progress.load();
  const next = Progress.nextLevel(gameId);
  const bands = [[1,10,'shallows'],[11,25,'reef'],[26,40,'trench'],[41,50,'abyss']];
  $app().innerHTML = `
  <div class="screen">
    <div class="topbar">
      <button class="back" id="l-back">‹</button>
      <div><div class="eyebrow">${g.result === 'time' ? 'fastest time wins' : 'highest score wins'}</div>
      <h2 style="font-size:26px">${g.name}</h2></div>
    </div>
    <div class="scroller">
      <button class="pill on">Solo</button>
      <button class="pill" id="l-rank">Leaderboard</button>
      <button class="pill" id="l-chal">Challenge a friend</button>
    </div>
    <div class="depth" id="l-depth"></div>
  </div>`;
  document.getElementById('l-back').onclick = () => go('#/home');
  document.getElementById('l-rank').onclick = () => go('#/ranks/' + gameId);
  document.getElementById('l-chal').onclick = () => go(`#/challenge/${gameId}/${next}`);
  const wrap = document.getElementById('l-depth');
  bands.forEach(([a,b,label]) => {
    const head = document.createElement('div');
    head.className = 'band';
    head.innerHTML = `<span class="bl">${label}</span><span style="flex:1"></span><span class="bl">${a}–${b}</span>`;
    wrap.appendChild(head);
    const row = document.createElement('div');
    row.className = 'levels';
    for (let l=a; l<=b; l++){
      const rec = prog[gameId + ':' + l];
      const btn = document.createElement('button');
      btn.className = 'lv' + (rec ? ' done' : l === next ? ' next' : l > next ? ' far' : '');
      btn.innerHTML = `<span>${l}</span><span class="st">${rec ? '★'.repeat(rec.stars) : ''}</span>`;
      btn.onclick = () => go(`#/play/${gameId}/${l}`);
      row.appendChild(btn);
    }
    wrap.appendChild(row);
  });
  setTab('play');
}

/* ═══════════════════════════════════════════════════════════════
   PHASE 6 — friends, duels, notifications
   ═══════════════════════════════════════════════════════════════ */

const Social = {
  friends:[], incoming:[], outgoing:[], names:{}, duels:[], reactions:{},

  async loadFriends(){
    const { edges = [], profiles = [] } = await api('friendList');
    profiles.forEach(p => this.names[p.id] = p);
    const me = State.user.id;
    this.friends = []; this.incoming = []; this.outgoing = [];
    edges.forEach(e => {
      const other = e.requester_id === me ? e.addressee_id : e.requester_id;
      if (e.status === 'accepted') this.friends.push(other);
      else if (e.status === 'pending'){
        if (e.addressee_id === me) this.incoming.push(other);
        else this.outgoing.push(other);
      }
    });
  },

  async loadDuels(){
    const { challenges = [], profiles = [], reactions = [] } = await api('challengeList');
    profiles.forEach(p => this.names[p.id] = p);
    this.duels = challenges;
    this.reactions = {};
    reactions.forEach(r => (this.reactions[r.challenge_id] = this.reactions[r.challenge_id] || []).push(r));
  },

  name(id){ return (this.names[id] && this.names[id].username) || 'someone'; },
  emoji(id){ return (this.names[id] && this.names[id].avatar_emoji) || '🐚'; }
};

/* ── friends & duels ── */
async function screenFriends(tab = 'duels'){
  setTab('friends');
  if (OFFLINE || !State.user){
    return $app().innerHTML = `
      <div class="screen">
        <div class="topbar"><div><div class="eyebrow">friends</div>
          <h2 style="font-size:26px">Your pool</h2></div></div>
        <div class="empty">Duels and friends need an account.<br>
          Guest play stays on this device.</div>
      </div>`;
  }

  $app().innerHTML = `
    <div class="screen">
      <div class="topbar">
        <div class="grow"><div class="eyebrow">friends</div><h2 style="font-size:26px">Your pool</h2></div>
        <button class="bell" id="f-bell" aria-label="Alerts">◔${State.unread ? '<span class="bdot"></span>' : ''}</button>
      </div>
      <div class="scroller" id="f-seg">
        <button class="pill ${tab==='duels'?'on':''}" data-t="duels">Duels</button>
        <button class="pill ${tab==='friends'?'on':''}" data-t="friends">Friends</button>
        <button class="pill ${tab==='add'?'on':''}" data-t="add">Add</button>
      </div>
      <div id="f-body"><div class="empty">Loading…</div></div>
    </div>`;

  document.getElementById('f-bell').onclick = () => go('#/alerts');
  document.querySelectorAll('#f-seg .pill').forEach(p =>
    p.onclick = () => screenFriends(p.dataset.t));

  const body = document.getElementById('f-body');
  try{
    if (tab === 'add') return paintAdd(body);
    await Social.loadFriends();
    if (tab === 'friends') return paintFriends(body);
    await Social.loadDuels();
    paintDuels(body);
  }catch(e){
    body.innerHTML = '<div class="empty">Could not reach the server. Try again in a moment.</div>';
  }
}

function paintFriends(body){
  const rows = [];
  if (Social.incoming.length){
    rows.push('<div class="eyebrow" style="margin:4px 0 8px">wants to play you</div>');
    Social.incoming.forEach(id => rows.push(`
      <div class="item">
        <div class="av">${Social.emoji(id)}</div>
        <div class="grow"><div class="nm">${Social.name(id)}</div>
          <div class="sub">sent you a request</div></div>
        <button class="pill on" data-yes="${id}">Accept</button>
        <button class="pill" data-no="${id}">✕</button>
      </div>`));
  }
  rows.push(`<div class="eyebrow" style="margin:18px 0 8px">friends · ${Social.friends.length}</div>`);
  if (!Social.friends.length){
    rows.push('<div class="empty">No friends yet. Add someone under the Add tab, then challenge them to any level.</div>');
  } else {
    Social.friends.forEach(id => rows.push(`
      <div class="item">
        <div class="av">${Social.emoji(id)}</div>
        <div class="grow"><div class="nm">${Social.name(id)}</div>
          <div class="sub">${(Social.names[id] && Social.names[id].xp) || 0} xp</div></div>
        <button class="pill" data-duel="${id}">Duel</button>
      </div>`));
  }
  if (Social.outgoing.length){
    rows.push('<div class="eyebrow" style="margin:18px 0 8px">waiting on them</div>');
    Social.outgoing.forEach(id => rows.push(`
      <div class="item"><div class="av">${Social.emoji(id)}</div>
        <div class="grow"><div class="nm">${Social.name(id)}</div>
          <div class="sub">request sent</div></div></div>`));
  }
  body.innerHTML = rows.join('');

  body.querySelectorAll('[data-yes]').forEach(b => b.onclick = async () => {
    b.disabled = true;
    await api('friendRespond', { userId:b.dataset.yes, accept:true });
    toast('You are friends now'); screenFriends('friends');
  });
  body.querySelectorAll('[data-no]').forEach(b => b.onclick = async () => {
    b.disabled = true;
    await api('friendRespond', { userId:b.dataset.no, accept:false });
    screenFriends('friends');
  });
  body.querySelectorAll('[data-duel]').forEach(b =>
    b.onclick = () => pickGameFor(b.dataset.duel));
}

function paintAdd(body){
  body.innerHTML = `
    <div class="field"><label>Find a player by username</label>
      <input id="f-q" placeholder="start typing…" autocomplete="off"></div>
    <div id="f-res"></div>`;
  const input = document.getElementById('f-q');
  const res = document.getElementById('f-res');
  let timer = null;
  input.oninput = () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 2) return res.innerHTML = '';
    timer = setTimeout(async () => {
      res.innerHTML = '<div class="empty">Searching…</div>';
      try{
        const { users = [] } = await api('friendSearch', { q });
        res.innerHTML = users.length ? users.map(u => `
          <div class="item">
            <div class="av">${u.avatar_emoji || '🐚'}</div>
            <div class="grow"><div class="nm">${u.username}</div>
              <div class="sub">${u.xp || 0} xp</div></div>
            <button class="pill" data-add="${u.id}">Add</button>
          </div>`).join('')
          : '<div class="empty">Nobody by that name.</div>';
        res.querySelectorAll('[data-add]').forEach(b => b.onclick = async () => {
          b.disabled = true; b.textContent = 'Sent';
          try{ await api('friendRequest', { userId:b.dataset.add }); toast('Request sent'); }
          catch(e){ toast(e.message); }
        });
      }catch(e){ res.innerHTML = '<div class="empty">Search failed.</div>'; }
    }, 280);
  };
}

function paintDuels(body){
  const me = State.user.id;
  if (!Social.duels.length){
    body.innerHTML = `<div class="empty">No duels yet.<br>
      Challenge a friend and you both play the identical board.</div>
      <div class="row"><button class="btn" id="d-new">Start a duel</button></div>`;
    document.getElementById('d-new').onclick = () => pickFriendFirst();
    return;
  }
  const fmt = (g, v) => v == null ? '—' : (g.result === 'time' ? fmtTime(v) : Math.round(v).toLocaleString());
  body.innerHTML = `<div class="row" style="margin:0 0 14px">
      <button class="btn ghost" id="d-new">Start a duel</button></div>` +
    Social.duels.map(c => {
      const g = byId(c.game_id);
      if (!g) return '';
      const them = c.from_user === me ? c.to_user : c.from_user;
      const mine = c.from_user === me ? c.from_result : c.to_result;
      const theirs = c.from_user === me ? c.to_result : c.from_result;
      const reacts = (Social.reactions[c.id] || []).map(r => r.emoji).join(' ');
      let action, sub;
      if (c.status === 'complete'){
        const verdict = !c.winner_id ? 'Dead heat'
          : c.winner_id === me ? 'You won' : Social.name(them) + ' won';
        sub = `${fmt(g, mine)} vs ${fmt(g, theirs)} · ${verdict}`;
        action = `<button class="pill" data-react="${c.id}">${reacts || '☺'}</button>`;
      } else if (c.turn_of === me){
        sub = theirs != null ? `${Social.name(them)} posted ${fmt(g, theirs)}` : 'You go first';
        action = `<button class="pill on" data-play="${c.id}">Your turn</button>`;
      } else {
        sub = mine != null ? `You posted ${fmt(g, mine)}` : 'Waiting to start';
        action = `<span class="pill" style="opacity:.55">Their turn</span>`;
      }
      return `<div class="item ${c.turn_of === me ? 'urgent' : ''}">
        <div class="av">${Social.emoji(them)}</div>
        <div class="grow">
          <div class="nm">${Social.name(them)} · ${g.name} ${c.level}</div>
          <div class="sub">${sub}</div></div>
        ${action}
      </div>`;
    }).join('');

  document.getElementById('d-new').onclick = () => pickFriendFirst();
  body.querySelectorAll('[data-play]').forEach(b => b.onclick = () => {
    const c = Social.duels.find(x => x.id === b.dataset.play);
    go(`#/play/${c.game_id}/${c.level}/${c.id}`);
  });
  body.querySelectorAll('[data-react]').forEach(b => b.onclick = () => {
    const id = b.dataset.react;
    sheet(`<div class="eyebrow">react</div>
      <h2 style="font-size:22px;margin:6px 0 12px">Say something</h2>
      <div class="emojibar">${['🔥','🧠','😤','🐌','👏','💀'].map(e=>`<button data-e="${e}">${e}</button>`).join('')}</div>`,
      { wire:(el, close)=> el.querySelectorAll('[data-e]').forEach(x => x.onclick = async () => {
          close();
          try{ await api('react', { challengeId:id, emoji:x.dataset.e }); toast('Sent'); screenFriends('duels'); }
          catch(e){ toast('Could not send that'); }
        }) });
  });
}

/* ── starting a duel ── */
async function pickFriendFirst(){
  if (!Social.friends.length) await Social.loadFriends().catch(()=>{});
  if (!Social.friends.length) return toast('Add a friend first');
  sheet(`<div class="eyebrow">new duel</div>
    <h2 style="font-size:22px;margin:6px 0 12px">Who are you playing?</h2>
    <div id="p-list">${Social.friends.map(id => `
      <div class="item" data-f="${id}">
        <div class="av">${Social.emoji(id)}</div>
        <div class="grow"><div class="nm">${Social.name(id)}</div></div>
        <span class="pill">Pick</span></div>`).join('')}</div>`,
    { wire:(el, close)=> el.querySelectorAll('[data-f]').forEach(row =>
        row.onclick = () => { close(); pickGameFor(row.dataset.f); }) });
}

function pickGameFor(friendId){
  sheet(`<div class="eyebrow">new duel · ${Social.name(friendId)}</div>
    <h2 style="font-size:22px;margin:6px 0 12px">Which puzzle?</h2>
    <div class="gamepick">${GAMES.map(g => `
      <button data-g="${g.id}">${g.name}<span>${g.result === 'time' ? 'fastest' : 'highest'}</span></button>`).join('')}</div>`,
    { wire:(el, close)=> el.querySelectorAll('[data-g]').forEach(b =>
        b.onclick = () => { close(); startDuel(friendId, b.dataset.g); }) });
}

async function startDuel(friendId, gameId){
  const level = Progress.nextLevel(gameId);
  try{
    const { challenge } = await api('challenge', { toUser:friendId, gameId, level });
    toast(`Duel set · ${byId(gameId).name} ${level}`);
    go(`#/play/${gameId}/${level}/${challenge.id}`);
  }catch(e){ toast(e.message || 'Could not start that duel'); }
}

    sheet(`<div class="eyebrow">challenge · ${byId(gameId).name} ${level}</div>

            try{

              go(`#/play/${gameId}/${level}/${challenge.id}`);

/* ── notifications ── */
const NOTE_COPY = {
  friend_request:   n => [`${Social.name(n.payload.from)} wants to be friends`, '#/friends'],
  friend_accepted:  n => [`${Social.name(n.payload.from)} accepted you`, '#/friends'],
  challenge:        n => [`${Social.name(n.payload.from)} challenged you`, '#/friends'],
  your_turn:        n => [`Your turn against ${Social.name(n.payload.from)}`, '#/friends'],
  challenge_result: n => ['A duel finished', '#/friends'],
  reaction:         n => [`${Social.name(n.payload.from)} reacted ${n.payload.emoji || ''}`, '#/friends']
};

async function screenAlerts(){
  setTab('friends');
  $app().innerHTML = `
    <div class="screen">
      <div class="topbar"><button class="back" id="n-back" aria-label="Back to friends">‹</button>
        <div><div class="eyebrow">alerts</div><h2 style="font-size:26px">What happened</h2></div></div>
      <div id="n-body"><div class="empty">Loading…</div></div>
    </div>`;
  document.getElementById('n-back').onclick = () => go('#/friends');
  const body = document.getElementById('n-body');
  if (OFFLINE || !State.user) return body.innerHTML = '<div class="empty">Alerts need an account.</div>';
  try{
    const { notifications = [], profiles = [] } = await api('notifications');
    profiles.forEach(p => Social.names[p.id] = p);
    body.innerHTML = notifications.length ? notifications.map(n => {
      const fn = NOTE_COPY[n.type];
      const [text, href] = fn ? fn(n) : [n.type, '#/friends'];
      return `<div class="item ${n.read_at ? '' : 'urgent'}" data-h="${href}">
        <div class="av">${n.payload && n.payload.from ? Social.emoji(n.payload.from) : '◔'}</div>
        <div class="grow"><div class="nm">${text}</div>
          <div class="sub">${new Date(n.created_at).toLocaleString()}</div></div></div>`;
    }).join('') : '<div class="empty">Nothing yet.</div>';
    body.querySelectorAll('[data-h]').forEach(el => el.onclick = () => go(el.dataset.h));
    await api('notificationsRead').catch(()=>{});
    State.unread = 0;
    setTab('friends');
  }catch(e){ body.innerHTML = '<div class="empty">Could not load alerts.</div>'; }
}

/* ── live turn alerts ── */
function watchNotifications(){
  if (OFFLINE || !State.user) return;
  try{
    sb.channel('tp-notes')
      .on('postgres_changes',
          { event:'INSERT', schema:'public', table:'notifications', filter:`user_id=eq.${State.user.id}` },
          payload => {
            State.unread++;
            const n = payload.new;
            const fn = NOTE_COPY[n.type];
            toast(fn ? fn(n)[0] : 'Something happened');
            Audio2.place();
            setTab(State.tab || 'play');
          })
      .subscribe();
  }catch(e){ /* realtime is a bonus, not a requirement */ }
}

/* ═══════════════════════════════════════════════════════════════
   PHASE 7 — boards, stats, the daily, and xp
   ═══════════════════════════════════════════════════════════════ */

/* ── xp tiers ── */
const TIERS = [
  [0,'Drifter'], [250,'Snorkeler'], [750,'Diver'], [1500,'Freediver'],
  [3000,'Trench Diver'], [6000,'Abyssal'], [12000,'Leviathan']
];
function tierOf(xp = 0){
  let i = 0;
  while (i + 1 < TIERS.length && xp >= TIERS[i+1][0]) i++;
  const [floor, name] = TIERS[i];
  const next = TIERS[i+1] || null;
  return { name, floor, next: next ? next[0] : null, nextName: next ? next[1] : null,
           pct: next ? Math.min(100, Math.round(((xp - floor) / (next[0] - floor)) * 100)) : 100 };
}

/* ── the daily pick, derived from the date exactly as the server does ── */
function dailyPick(dateStr){
  const r = mulberry32(xmur3('tidepool:daily:' + dateStr)());
  const gameId = GAMES[(r() * GAMES.length) | 0].id;
  const level  = 1 + ((r() * 50) | 0);
  return { date: dateStr, gameId, level };
}
const todayStr = () => new Date().toISOString().slice(0, 10);

/* ── leaderboards ── */
async function screenRanks(gameId, level){
  setTab('ranks');
  const g = gameId ? byId(gameId) : null;
  const lvl = level ? +level : null;

  $app().innerHTML = `
    <div class="screen">
      <div class="topbar">
        <div class="grow">
          <div class="eyebrow">${g ? (g.result === 'time' ? 'fastest wins' : 'highest wins') : 'across every puzzle'}</div>
          <h2 style="font-size:26px">${g ? g.name : 'Standings'}</h2>
        </div>
      </div>
      <div class="scroller" id="rk-games">
        <button class="pill ${!g?'on':''}" data-g="">Overall</button>
        <button class="pill" data-daily="1">Today</button>
        ${GAMES.map(x => `<button class="pill ${g&&g.id===x.id?'on':''}" data-g="${x.id}">${x.name}</button>`).join('')}
      </div>
      ${g ? `<div class="scroller" id="rk-lvl">
        <button class="pill ${!lvl?'on':''}" data-l="">All levels</button>
        <button class="pill ${lvl?'on':''}" data-l="pick">${lvl ? 'Level ' + lvl : 'One level…'}</button>
      </div>` : ''}
      <div class="scroller" id="rk-scope">
        <button class="pill on" data-s="global">Everyone</button>
        <button class="pill" data-s="friends">Friends</button>
      </div>
      <div id="rk-body"><div class="empty">Loading…</div></div>
    </div>`;

  document.querySelectorAll('#rk-games .pill[data-g]').forEach(p => p.onclick = () =>
    go(p.dataset.g ? '#/ranks/' + p.dataset.g : '#/ranks'));
  document.querySelector('[data-daily]').onclick = () => go('#/daily');
  const lvlBar = document.getElementById('rk-lvl');
  if (lvlBar) lvlBar.querySelectorAll('.pill').forEach(p => p.onclick = () => {
    if (p.dataset.l === '') return go('#/ranks/' + g.id);
    pickLevel(g.id, lvl || Progress.nextLevel(g.id));
  });

  const body = document.getElementById('rk-body');
  const load = async scope => {
    body.innerHTML = '<div class="empty">Loading…</div>';
    if (OFFLINE || !State.user)
      return body.innerHTML = '<div class="empty">Standings need an account.<br>Guest scores stay on this device.</div>';
    try{
      const res = g ? await api('leaderboard', { gameId:g.id, level:lvl, scope })
                    : await api('overall', { scope });
      body.innerHTML = renderBoard(res.rows || [], g, lvl, res.timed);
    }catch(e){ body.innerHTML = '<div class="empty">Could not load the board.</div>'; }
  };
  document.querySelectorAll('#rk-scope .pill').forEach(p => p.onclick = () => {
    document.querySelectorAll('#rk-scope .pill').forEach(x => x.classList.remove('on'));
    p.classList.add('on'); load(p.dataset.s);
  });
  load('global');
}

function renderBoard(rows, g, lvl, timed){
  if (!rows.length) return '<div class="empty">Nobody here yet. Go be first.</div>';
  const me = State.user && State.user.id;
  return rows.map((r, i) => {
    const right = lvl
      ? (timed ? fmtTime(r.value) : Math.round(r.value).toLocaleString())
      : `${r.stars}★`;
    const sub = lvl
      ? `${'★'.repeat(r.stars || 0)}`
      : `${r.levels_cleared} levels${r.games ? ' · ' + r.games + ' games' : ''}`;
    return `<div class="item ${r.user_id === me ? 'me' : ''}">
      <div class="rk">${i+1}</div>
      <div class="av">${r.avatar_emoji || '🐚'}</div>
      <div class="grow"><div class="nm">${r.username}</div><div class="sub">${sub}</div></div>
      <div class="mono">${right}</div>
    </div>`;
  }).join('');
}

function pickLevel(gameId, current){
  sheet(`<div class="eyebrow">${byId(gameId).name}</div>
    <h2 style="font-size:22px;margin:6px 0 12px">Which level's board?</h2>
    <div class="levels" style="padding:0;max-height:46vh;overflow-y:auto">
      ${Array.from({length:50}, (_,i) => i+1).map(l =>
        `<button class="lv ${l===current?'next':''}" data-l="${l}"><span>${l}</span><span class="st"></span></button>`).join('')}
    </div>`,
    { wire:(el, close)=> el.querySelectorAll('[data-l]').forEach(b =>
        b.onclick = () => { close(); go(`#/ranks/${gameId}/${b.dataset.l}`); }) });
}

/* ── today's puzzle ── */
async function screenDaily(){
  setTab('ranks');
  const pick = dailyPick(todayStr());
  const g = byId(pick.gameId);
  const done = Progress.best(pick.gameId, pick.level);
  $app().innerHTML = `
    <div class="screen">
      <div class="topbar"><button class="back" id="d-back" aria-label="Back to standings">‹</button>
        <div><div class="eyebrow">${pick.date}</div><h2 style="font-size:26px">Today's puzzle</h2></div></div>
      <div class="daily big">
        <div class="eyebrow">everyone plays this exact board</div>
        <h3>${g.name} · level ${pick.level}</h3>
        <p>${g.result === 'time' ? 'Fastest time takes the day.' : 'Highest score takes the day.'}</p>
        <div class="row"><button class="btn" id="d-play">${done ? 'Play again' : 'Play it'}</button></div>
      </div>
      <div class="eyebrow" style="margin:22px 0 10px">today's board</div>
      <div id="d-body"><div class="empty">Loading…</div></div>
    </div>`;
  document.getElementById('d-back').onclick = () => go('#/ranks');
  document.getElementById('d-play').onclick = () => go(`#/play/${pick.gameId}/${pick.level}`);
  const body = document.getElementById('d-body');
  if (OFFLINE || !State.user)
    return body.innerHTML = '<div class="empty">The daily board needs an account. You can still play the puzzle.</div>';
  try{
    const res = await api('daily', {});
    body.innerHTML = renderBoard(res.rows || [], g, res.level, res.timed);
  }catch(e){ body.innerHTML = `<div class="empty">Could not load today's board.</div>`; }
}

/* ── you ── */
async function screenYou(){
  setTab('you');
  const prog = Progress.load();
  const local = {};
  Object.entries(prog).forEach(([k, v]) => { local[k] = v; });

  const stats = () => {
    const per = {};
    GAMES.forEach(g => per[g.id] = { cleared:0, stars:0 });
    Object.entries(local).forEach(([k, v]) => {
      const id = k.split(':')[0];
      if (!per[id]) return;
      per[id].cleared++;
      per[id].stars += v.stars || 0;
    });
    const cleared = Object.values(per).reduce((a,b)=>a+b.cleared, 0);
    const stars   = Object.values(per).reduce((a,b)=>a+b.stars, 0);
    const started = Object.values(per).filter(p=>p.cleared).length;
    return { per, cleared, stars, started };
  };

  const paint = (xp) => {
    const { per, cleared, stars, started } = stats();
    const t = tierOf(xp);
    const best = GAMES.slice().sort((a,b) => per[b.id].stars - per[a.id].stars)[0];
    $app().innerHTML = `
      <div class="screen">
        <div class="topbar">
          <div class="grow"><div class="eyebrow">profile</div>
            <h2 style="font-size:26px">${State.profile ? State.profile.username : 'Guest'}</h2></div>
          <div class="av big">${(State.profile && State.profile.avatar_emoji) || '🐚'}</div>
        </div>

        <div class="tier">
          <div class="tier-top"><b>${t.name}</b><span class="mono">${xp} xp</span></div>
          <div class="bar"><i style="width:${t.pct}%"></i></div>
          <div class="sub">${t.next ? `${t.next - xp} xp to ${t.nextName}` : 'Top of the ladder'}</div>
        </div>

        <div class="statgrid">
          <div><b class="mono">${cleared}</b><span>levels cleared</span></div>
          <div><b class="mono">${stars}</b><span>stars earned</span></div>
          <div><b class="mono">${started}/20</b><span>puzzles played</span></div>
          <div><b class="mono">${cleared ? Math.round((cleared/1000)*100) : 0}%</b><span>of all 1000</span></div>
        </div>

        ${cleared ? `<div class="eyebrow" style="margin:24px 0 10px">strongest · ${best.name}</div>` : ''}
        <div class="eyebrow" style="margin:22px 0 10px">progress</div>
        <div id="y-bars">${GAMES.map(g => {
          const p = per[g.id];
          return `<div class="pbar" data-g="${g.id}">
            <div class="pbar-top"><span>${g.name}</span>
              <span class="mono">${p.cleared}/50 · ${p.stars}★</span></div>
            <div class="bar"><i style="width:${(p.cleared/50)*100}%"></i></div>
          </div>`;
        }).join('')}</div>

        <div class="item" style="margin-top:22px">
          <div class="av">${Audio2.on?'🔊':'🔇'}</div>
          <div class="grow"><div class="nm">Sound</div><div class="sub">Synthesized, nothing downloaded</div></div>
          <button class="pill" id="y-sound">${Audio2.on?'On':'Off'}</button></div>
        ${State.user ? '<div class="row"><button class="btn ghost" id="y-out">Sign out</button></div>'
                     : '<div class="row"><button class="btn" id="y-in">Create an account</button></div>'}
      </div>`;
    document.getElementById('y-sound').onclick = e => { e.target.textContent = Audio2.toggle() ? 'On' : 'Off'; };
    document.querySelectorAll('.pbar').forEach(el => el.onclick = () => go('#/levels/' + el.dataset.g));
    const out = document.getElementById('y-out');
    if (out) out.onclick = async () => { await sb.auth.signOut(); State.user = null; State.profile = null; screenAuth(); };
    const inb = document.getElementById('y-in');
    if (inb) inb.onclick = () => screenAuth('signup');
  };

  paint((State.profile && State.profile.xp) || 0);

  /* the server holds the real record; fold it in when it answers */
  if (!OFFLINE && State.user){
    try{
      const { profile, scores = [] } = await api('profile');
      State.profile = profile;
      scores.forEach(s => {
        local[s.game_id + ':' + s.level] = { value:s.value, stars:s.stars, resultType:s.result_type };
      });
      paint((profile && profile.xp) || 0);
    }catch(e){}
  }
}

/* ── tabs + router ── */
const TABS = [
  ['play','Play','◈','#/home'], ['friends','Friends','◇','#/friends'],
  ['ranks','Ranks','▲','#/ranks'], ['you','You','●','#/you']
];
function setTab(which){
  State.tab = which;
  const t = document.getElementById('tabs');
  t.classList.remove('hidden');
  t.innerHTML = TABS.map(([id,label,ic,href]) =>
    `<button class="${id===which?'on':''}" data-h="${href}" role="tab"
       aria-selected="${id===which}" aria-label="${label}">
       <span class="ic">${ic}</span>${label}${id==='friends'&&State.unread?'<span class="dot"></span>':''}
     </button>`).join('');
  t.querySelectorAll('button').forEach(b => b.onclick = () => go(b.dataset.h));
}
function go(hash, silent){
  if (silent){ history.replaceState(null,'',hash); return; }
  location.hash = hash;
}
function route(){
  const p = (location.hash || '#/home').slice(2).split('/');
  Host.stop();
  window.onkeydown = null;          // games bind keys; drop them on the way out
  try{
    return dispatch(p);
  }catch(e){
    console.error(e);
    toast('That screen could not open.');
    if (p[0] !== 'home') go('#/home');
  }
}
function dispatch(p){
  switch (p[0]){
    case 'home':      return screenHome();
    case 'levels':    return screenLevels(p[1]);
    case 'play':      return Host.open(p[1], +p[2] || 1, p[3] || null);
    case 'ranks':     return screenRanks(p[1], p[2]);
    case 'daily':     return screenDaily();
    case 'friends':   return screenFriends();
    case 'alerts':    return screenAlerts();
    case 'you':       return screenYou();
    case 'challenge': return screenChallenge(p[1], +p[2] || 1);
    case 'auth':      return screenAuth();
    default:          return screenHome();
  }
}
window.addEventListener('hashchange', route);

/* ── boot ── */
async function boot(){
  if (!OFFLINE){
    const { data:{ session } } = await sb.auth.getSession();
    if (session){
      State.user = session.user;
      try{
        const r = await api('profile');
        State.profile = r.profile;
        State.unread = r.unread || 0;
      }catch(e){}
      watchNotifications();
    }
  }
  if (!State.user && !location.hash.startsWith('#/home') && OFFLINE === false && !State.profile){
    // no session and a real backend exists → land on auth
    if (!sessionStorage.getItem('tp.guest')) return screenAuth();
  }
  route();
}
document.addEventListener('click', () => { /* unlock audio on first gesture */ }, { once:true });

/* offline: the puzzles are generated on device, so a cached shell is a whole game */
if ('serviceWorker' in navigator && location.protocol === 'https:'){
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}

/* never leave the player staring at a blank screen */
window.addEventListener('error', e => {
  console.error(e.error || e.message);
  toast('Something went wrong there. Try again.');
});
window.addEventListener('unhandledrejection', e => {
  console.error(e.reason);
  if (!navigator.onLine) toast('You are offline — scores will not post.');
});
window.addEventListener('offline', () => toast('Offline. You can still play; scores wait.'));

boot();
</script>
